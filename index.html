// ─── ROI badge ────────────────────────────────────────────────────────────────
function RoiBadge({ team, st }) {
  if (team.random) return (
    <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.08em",color:C.mute,
      border:`1px solid ${C.line}`,borderRadius:3,padding:"1px 5px"}}>🎲 RANDOM</span>
  );
  const pay = payoutLocked(st);
  if (team.bid < 2) return null;
  const roi = pay / team.bid;
  const color = roi >= 3 ? C.green : roi >= 1 ? "#A8D8A8" : roi > 0 ? C.gold : !isAlive(st) ? C.red : C.mute;
  const label = roi >= 1 ? `${roi.toFixed(1)}×` : pay > 0 ? `${roi.toFixed(2)}×` : isAlive(st) ? "—" : "0×";
  return (
    <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.06em",color,
      border:`1px solid ${color}22`,borderRadius:3,padding:"1px 6px",background:`${color}18`}}>
      {label}
    </span>
  );
}

// ─── H2H leaderboard ──────────────────────────────────────────────────────────
function H2HLeaderboard({ h2h }) {
  const players = ["Ben","Patrick","Sandeep","Sunny"];
  const records = React.useMemo(() => {
    const r = {};
    players.forEach(p => { r[p] = {w:0, d:0, l:0}; });
    Object.entries(h2h).forEach(([key, [w1, draws, w2]]) => {
      const [p1, p2] = key.split("|");
      if (r[p1]) { r[p1].w += w1; r[p1].d += draws; r[p1].l += w2; }
      if (r[p2]) { r[p2].w += w2; r[p2].d += draws; r[p2].l += w1; }
    });
    return players
      .map(name => ({ name, ...r[name], pts: r[name].w*3 + r[name].d, played: r[name].w + r[name].d + r[name].l }))
      .sort((a,b) => b.pts-a.pts || b.w-a.w || a.l-b.l);
  }, [h2h]);

  const medals = ["🥇","🥈","🥉",""];

  return (
    <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:14}}>
      <div style={{...disp,fontSize:11,fontWeight:600,letterSpacing:"0.15em",color:C.mute,marginBottom:10}}>
        LEADERBOARD
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {records.map((p, i) => {
          const color = BIDDERS[p.name].color;
          const isFirst = i === 0 && p.pts > 0;
          return (
            <div key={p.name} style={{
              display:"flex",alignItems:"center",gap:10,
              background: isFirst ? `${color}15` : "#0E1828",
              border:`1px solid ${isFirst ? color+"40" : C.line}`,
              borderRadius:6,padding:"8px 12px"
            }}>
              <span style={{width:18,fontSize:13,textAlign:"center"}}>{medals[i]||""}</span>
              <span style={{...disp,fontSize:13,fontWeight:700,color,flex:1,letterSpacing:"0.04em"}}>
                {p.name}
              </span>
              {p.played === 0 ? (
                <span style={{fontSize:11,color:C.mute}}>No matches yet</span>
              ) : (
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:11,color:C.mute}}>
                    <b style={{color:C.green}}>{p.w}</b>W · <b style={{color:C.mute}}>{p.d}</b>D · <b style={{color:C.red}}>{p.l}</b>L
                  </span>
                  <span style={{
                    ...disp,fontSize:13,fontWeight:700,
                    color: i===0 && p.pts>0 ? color : C.text,
                    minWidth:30,textAlign:"right"
                  }}>
                    {p.pts} <span style={{fontSize:9,color:C.mute,fontWeight:400}}>PTS</span>
                  </span>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── H2H grid ─────────────────────────────────────────────────────────────────
function H2HSection({ h2h }) {
  const players = ["Ben","Patrick","Sandeep","Sunny"];
  const pairs = [];
  for (let i = 0; i < players.length; i++)
    for (let j = i+1; j < players.length; j++)
      pairs.push([players[i], players[j]]);

  return (
    <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:14,marginTop:4}}>
      <div style={{...disp,fontSize:11,fontWeight:600,letterSpacing:"0.15em",color:C.mute,marginBottom:10}}>
        HEAD-TO-HEAD RIVALRIES
      </div>
      <div className="grid grid-cols-2 md:grid-cols-3 gap-2">
        {pairs.map(([p1,p2]) => {
          const key = `${p1}|${p2}`;
          const rec = h2h[key] || [0,0,0];
          const [w1,d,w2] = rec;
          const played = w1+d+w2;
          const leader = w1>w2 ? p1 : w2>w1 ? p2 : null;
          return (
            <div key={key} style={{background:"#0E1828",border:`1px solid ${C.line}`,
              borderRadius:6,padding:"8px 10px"}}>
              <div className="flex items-center justify-between">
                <span style={{...disp,fontSize:11,fontWeight:700,color:BIDDERS[p1].color,letterSpacing:"0.06em"}}>
                  {BIDDERS[p1].short}
                </span>
                <span style={{fontSize:11,color:C.mute,letterSpacing:"0.04em"}}>
                  {played===0
                    ? <span style={{color:C.mute}}>No matches yet</span>
                    : <><b style={{color:w1>w2?C.green:w1<w2?C.red:C.mute}}>{w1}</b>
                       <span style={{color:C.mute}}> · {d} · </span>
                       <b style={{color:w2>w1?C.green:w2<w1?C.red:C.mute}}>{w2}</b></>
                  }
                </span>
                <span style={{...disp,fontSize:11,fontWeight:700,color:BIDDERS[p2].color,letterSpacing:"0.06em"}}>
                  {BIDDERS[p2].short}
                </span>
              </div>
              {played>0 && leader && (
                <div style={{fontSize:9,color:C.mute,textAlign:"center",marginTop:3,letterSpacing:"0.08em"}}>
                  {leader.toUpperCase()} LEADING
                </div>
              )}
              {played>0 && !leader && (
                <div style={{fontSize:9,color:C.gold,textAlign:"center",marginTop:3,letterSpacing:"0.08em"}}>
                  LEVEL
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ESPN live fetch ──────────────────────────────────────────────────────────
function espnDate(isoStr) {
  return new Date(isoStr).toLocaleDateString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric"});
}
function espnTime(isoStr) {
  return new Date(isoStr).toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit",timeZoneName:"short"});
}
function parseML(v) {
  if (v == null) return null;
  const n = parseInt(String(v).replace("+",""),10);
  return isNaN(n) ? null : n;
}
function extractOddsLive(comp) {
  const o = (comp.odds||[])[0]; if (!o) return null;
  const ml = o.moneyline||{};
  const hv = parseML(ml.home?.close?.odds);
  const av = parseML(ml.away?.close?.odds);
  const dv = parseML(ml.draw?.close?.odds) ?? parseML(o.drawOdds?.moneyLine);
  if (hv == null || av == null) return null;
  const p = x => x < 0 ? Math.abs(x)/(Math.abs(x)+100) : 100/(x+100);
  const h=p(hv), a=p(av), d=dv!=null?p(dv):Math.max(0.05,1-h-a), t=h+a+d;
  return {home:Math.round(h/t*100)/100,draw:Math.round(d/t*100)/100,away:Math.round(a/t*100)/100};
}
function etDay(offsetMs=0) {
  return new Date(Date.now()+offsetMs)
    .toLocaleDateString("en-CA",{timeZone:"America/New_York"}).replace(/-/g,"");
}
async function fetchESPN() {
  const dates = [etDay(-864e5), etDay(), etDay(864e5)];
  const all = [];
  for (const dateStr of dates) {
    try {
      const r  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}&t=${Date.now()}`);
      const ev = (await r.json()).events || [];
      for (const e of ev) {
        const comp = e.competitions?.[0]; if (!comp) continue;
        const cs   = comp.competitors||[]; if (cs.length<2) continue;
        const home = cs.find(c=>c.homeAway==="home")||cs[0];
        const away = cs.find(c=>c.homeAway==="away")||cs[1];
        const st   = comp.status?.type||{};
        const done = st.completed||false;
        const live = st.state==="in"||(st.name||"").toLowerCase().includes("halftime");
        const score= done||live ? `${home.score??0}-${away.score??0}` : "";
        const k    = live?"LIVE":done?"":espnTime(e.date);
        const note = (comp.altGameNote||"").replace(/FIFA World Cup,?\s*/g,"").trim();
        const odds = done||live ? null : extractOddsLive(comp);
        const fx   = {d:espnDate(e.date),k,a:home.team?.displayName||"",b:away.team?.displayName||"",s:score,g:note};
        if (odds) fx.odds = odds;
        all.push(fx);
      }
    } catch(_) {}
  }
  return all;
}

// ─── Main component ───────────────────────────────────────────────────────────
function PoolDashboard() {
  const [tab, setTab]               = useState("fixtures");
  const [status, setStatus]         = useState(seedStatus);
  const [fixtures, setFixtures]     = useState(SEED_FIXTURES);
  const [h2h, setH2h]               = useState({});
  const [updated, setUpdated]       = useState(new Date(SEED_DATE));
  const [fixturesLive, setFixturesLive] = useState(false);
  const [ownerFilter, setOwnerFilter] = useState("All");
  const [aliveOnly, setAliveOnly]   = useState(false);
  const [sortCol, setSortCol]       = useState("payout");   // bid|payout|roi|wdl|name
  const [sortDir, setSortDir]       = useState(-1);          // 1 asc, -1 desc

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => -d);
    else { setSortCol(col); setSortDir(-1); }
  };
  const SortHdr = ({col, children, align}) => {
    const active = sortCol === col;
    return (
      <span onClick={() => toggleSort(col)}
        style={{cursor:"pointer", color: active ? C.gold : C.mute,
          textAlign: align||"left", userSelect:"none",
          display:"flex", alignItems:"center", gap:3,
          justifyContent: align==="right" ? "flex-end" : "flex-start"}}>
        {children}
        <span style={{fontSize:8, opacity: active ? 1 : 0.3}}>
          {active ? (sortDir === -1 ? "▼" : "▲") : "⬍"}
        </span>
      </span>
    );
  };

  // Fetch standings + H2H from scores.json (updated by GitHub Actions every 5 min)
  useEffect(() => {
    const run = () =>
      fetch("./data/scores.json?t=" + Date.now())
        .then(r => r.json())
        .then(data => {
          if (data.updated && new Date(data.updated) > new Date(SEED_DATE)) {
            if (data.status) setStatus({...blankStatus(), ...data.status});
            if (data.h2h)    setH2h(data.h2h);
          }
        })
        .catch(() => {});
    run();
    const id = setInterval(run, 60000);
    return () => clearInterval(id);
  }, []);

  // Fetch fixtures live from ESPN every 60s
  useEffect(() => {
    const run = () => fetchESPN()
      .then(fx => { if (fx.length) { setFixtures(fx); setFixturesLive(true); setUpdated(new Date()); } })
      .catch(() => {});
    run();
    const id = setInterval(run, 60000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    const l = document.createElement("link");
    l.rel="stylesheet";
    l.href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap";
    document.head.appendChild(l);
    return () => document.head.removeChild(l);
  }, []);

  const board = useMemo(() => {
    return Object.keys(BIDDERS).map(name => {
      const mine    = TEAMS.filter(t => t.owner === name);
      const spent   = mine.reduce((s,t) => s + t.bid, 0);
      const locked  = mine.reduce((s,t) => s + payoutLocked(status[t.name].st), 0);
      const ceiling = mine.reduce((s,t) => s + maxPayout(status[t.name].st), 0);
      const alive   = mine.filter(t => isAlive(status[t.name].st)).length;
      return {name, spent, locked, ceiling, alive, net: locked - spent, teams: mine};
    }).sort((a,b) => b.net-a.net || b.locked-a.locked || b.alive-a.alive);
  }, [status]);

  const superlatives = useMemo(() => {
    let bestValue=null, bust=null, hotStreak=null;
    const teamRecords = TEAMS.map(t => {
      const s = status[t.name];
      return {...t, s, pay: payoutLocked(s.st), roi: t.bid>=2 && !t.random ? payoutLocked(s.st)/t.bid : null};
    });
    for (const t of teamRecords) {
      if (t.roi !== null && t.pay > 0 && (!bestValue || t.roi > bestValue.roi)) bestValue = t;
      if (!isAlive(t.s.st) && t.pay===0 && (!bust || t.bid > bust.bid)) bust = t;
      if (t.s.w >= 2 && (!hotStreak || t.s.w > hotStreak.s.w)) hotStreak = t;
    }
    return {bestValue, bust, hotStreak};
  }, [status]);

  const filteredTeams = useMemo(() => {
    const list = TEAMS.filter(t =>
      (ownerFilter==="All" || t.owner===ownerFilter) &&
      (!aliveOnly || isAlive(status[t.name].st))
    );
    list.sort((a,b) => {
      const sa=status[a.name], sb=status[b.name];
      const pa=payoutLocked(sa.st), pb=payoutLocked(sb.st);
      const roiA = a.bid>=2&&!a.random ? pa/a.bid : -1;
      const roiB = b.bid>=2&&!b.random ? pb/b.bid : -1;
      let cmp = 0;
      if      (sortCol==="name")   cmp = a.name.localeCompare(b.name);
      else if (sortCol==="bid")    cmp = a.bid - b.bid;
      else if (sortCol==="payout") cmp = pa - pb;
      else if (sortCol==="roi")    cmp = roiA - roiB;
      else if (sortCol==="wdl")    cmp = sa.pts - sb.pts || sa.w - sb.w;
      return cmp * sortDir || b.bid - a.bid;
    });
    return list;
  }, [ownerFilter, aliveOnly, status, sortCol, sortDir]);

  return (
    <div style={{...body,background:C.bg,minHeight:"100vh",color:C.text}}>
      <style>{`
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
        .livepulse{animation:pulse 1.6s ease-in-out infinite}
        @media(prefers-reduced-motion:reduce){.livepulse{animation:none}}
        .odds-bar-home{background:${C.green}}
        .odds-bar-away{background:${C.blue}}
      `}</style>

      {/* ── Header ── */}
      <div style={{borderBottom:`1px solid ${C.line}`,background:"linear-gradient(180deg,#0E1830,#0B1220)"}}>
        <div className="max-w-5xl mx-auto px-4 pt-5 pb-4">
          <div className="flex items-start justify-between gap-3 flex-wrap">
            <div>
              <div style={{...disp,color:C.gold,letterSpacing:"0.18em",fontSize:11,fontWeight:600}}>
                FIFA WORLD CUP 2026 · 48 TEAMS · $800 POOL
              </div>
              <h1 style={{...disp,fontSize:34,fontWeight:700,lineHeight:1.05,letterSpacing:"0.01em",textTransform:"uppercase"}}>
                Auction Pool <span style={{color:C.green}}>Live</span>
              </h1>
            </div>
            <div className="flex flex-col items-end justify-center gap-1">
              <div style={{fontSize:12,color:C.mute,textAlign:"right"}}>
                <span className="livepulse" style={{color:fixturesLive?C.green:C.mute}}>●</span>
                {fixturesLive ? " Fixtures live from ESPN · refreshes every 60s" : " Loading fixtures…"}
              </div>
              <div style={{fontSize:11,color:C.mute}}>
                Last refreshed: <span style={{color:C.text}}>
                  {updated.toLocaleString([],{month:"short",day:"numeric",hour:"numeric",minute:"2-digit",timeZoneName:"short"})}
                </span>
              </div>
            </div>
          </div>
        </div>

        {/* Scorebug rail */}
        <div className="max-w-5xl mx-auto px-4 pb-4">
          <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
            {board.map((b,i) => (
              <div key={b.name} style={{background:C.panel,border:`1px solid ${C.line}`,
                borderLeft:`4px solid ${BIDDERS[b.name].color}`,borderRadius:6,padding:"8px 12px"}}>
                <div className="flex items-center justify-between">
                  <span style={{...disp,fontSize:13,fontWeight:600,letterSpacing:"0.08em"}}>
                    <span style={{color:C.mute}}>{i+1}</span>&nbsp;{b.name.toUpperCase()}
                  </span>
                  <span style={{fontSize:11,color:C.mute}}>{b.alive}/12</span>
                </div>
                <div className="flex items-baseline justify-between mt-1">
                  <span style={{...disp,fontSize:20,fontWeight:700,color:b.net>=0?C.green:C.text}}>
                    {b.net>=0?`+$${b.net}`:`−$${Math.abs(b.net)}`}
                  </span>
                  <span style={{fontSize:10,color:C.gold}}>${b.locked} · ⌈$${b.ceiling}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div className="max-w-5xl mx-auto px-4 mt-4">
        <div className="flex gap-2 flex-wrap">
          {[["board","LEADERBOARD"],["groups","GROUPS"],["fixtures","FIXTURES"],["teams","TEAMS"]].map(([id,label]) => (
            <button key={id} onClick={()=>setTab(id)}
              style={{...disp,fontSize:14,fontWeight:600,letterSpacing:"0.1em",padding:"8px 18px",
                borderRadius:6,cursor:"pointer",border:`1px solid ${tab===id?C.gold:C.line}`,
                background:tab===id?"#1A2438":"transparent",color:tab===id?C.gold:C.mute}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      {/* ══ LEADERBOARD ══ */}
      {tab==="board" && (
        <div className="max-w-5xl mx-auto px-4 py-4 space-y-3">
          {board.map((b,i) => (
            <div key={b.name} style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
              <div className="flex items-center justify-between px-4 py-3"

          {/* Superlatives */}

              )}
            </div>
            <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:14}}>
              <div style={{...disp,fontSize:11,fontWeight:600,letterSpacing:"0.15em",color:C.red}}>BIGGEST BUST</div>
              {superlatives.bust ? (
                <div style={{fontSize:13,marginTop:6}}>
                  <Flag f={superlatives.bust.flag} /> <b>{superlatives.bust.name}</b>
                  <span style={{color:BIDDERS[superlatives.bust.owner].color}}> ({superlatives.bust.owner})</span>

                <div style={{fontSize:13,marginTop:6}}>
                  <Flag f={superlatives.hotStreak.flag} /> <b>{superlatives.hotStreak.name}</b>
                  <span style={{color:BIDDERS[superlatives.hotStreak.owner].color}}> ({superlatives.hotStreak.owner})</span>
                  <br/><span style={{color:C.mute,fontSize:12}}>{superlatives.hotStreak.s.w}W in group stage so far</span>
                </div>
              ) : (
                <div style={{fontSize:12,color:C.mute,marginTop:6}}>No teams have won multiple yet.</div>

              <span>4th <b style={{color:C.gold}}>$50</b></span>
              <span>QF exit <b>$25</b></span>
              <span>R16 exit <b>$15</b></span>

                    style={{borderBottom:`1px solid ${C.line}`,background:"#16203A"}}>
                    <span style={{...disp,fontSize:14,fontWeight:700,letterSpacing:"0.12em"}}>GROUP {letter}</span>

                          <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.06em",

          </div>
        </div>
      )}

      {/* ══ FIXTURES ══ */}
      {tab==="fixtures" && (
        <div className="max-w-5xl mx-auto px-4 py-4 space-y-4">
          <H2HLeaderboard h2h={h2h} />
          <H2HSection h2h={h2h} />
          {fixtures.length===0 && (
            <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,
              padding:20,textAlign:"center",color:C.mute,fontSize:14}}>
              No fixtures loaded — data auto-updates every 5 minutes during match hours.
            </div>
          )}
          {Object.entries(
            fixtures.reduce((acc,m) => { (acc[m.d||"Schedule"]||=[]).push(m); return acc; }, {})
          ).map(([day,matches]) => {
            const today   = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
            const isToday = day===today;
            return (
              <div key={day}>
                <div className="flex items-center gap-2 mb-2">
                  <span style={{...disp,fontSize:13,fontWeight:700,letterSpacing:"0.14em",
                    color:isToday?C.gold:C.mute}}>{day.toUpperCase()}</span>
                  {isToday && (
                    <span style={{...disp,fontSize:10,fontWeight:600,letterSpacing:"0.1em",

                          {m.g && <span>{m.g}</span>}

                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
          {fixtures.length>0 && (
            <div style={{fontSize:11,color:C.mute}}>
              ⚔ head-to-head between pool members · Odds shown for upcoming matches (implied win probability)
            </div>
          )}
        </div>
      )}

      {/* ══ TEAMS ══ */}
      {tab==="teams" && (
        <div className="max-w-5xl mx-auto px-4 py-4">
          <div className="flex flex-wrap items-center gap-2 mb-3">
            {["All",...Object.keys(BIDDERS)].map(o => (
              <button key={o} onClick={()=>setOwnerFilter(o)}
                style={{fontSize:12,fontWeight:600,padding:"5px 12px",borderRadius:999,cursor:"pointer",
                  border:`1px solid ${ownerFilter===o?(BIDDERS[o]?.color||C.gold):C.line}`,
                  background:ownerFilter===o?"#1A2438":"transparent",
                  color:ownerFilter===o?(BIDDERS[o]?.color||C.gold):C.mute}}>
                {o}
              </button>
            ))}
            <button onClick={()=>setAliveOnly(!aliveOnly)}
              style={{fontSize:12,fontWeight:600,padding:"5px 12px",borderRadius:999,cursor:"pointer",
                marginLeft:"auto",border:`1px solid ${aliveOnly?C.green:C.line}`,
                background:aliveOnly?"#13261C":"transparent",color:aliveOnly?C.green:C.mute}}>
              Alive only
            </button>
          </div>
          <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
            <div className="grid px-3 py-2"
              style={{gridTemplateColumns:"minmax(0,2fr) 0.8fr 0.5fr 0.9fr 1.2fr 0.6fr 0.7fr",gap:6,
                fontSize:10,letterSpacing:"0.12em",...disp,fontWeight:600,
                borderBottom:`1px solid ${C.line}`}}>
              <SortHdr col="name">TEAM</SortHdr>
              <span style={{color:C.mute}}>OWNER</span>
              <SortHdr col="bid">BID</SortHdr>
              <SortHdr col="wdl">W-D-L (PTS)</SortHdr>
              <span style={{color:C.mute}}>STATUS</span>
              <SortHdr col="payout" align="right">PAYOUT</SortHdr>
              <SortHdr col="roi" align="right">ROI</SortHdr>
            </div>
            {filteredTeams.map(t => {
              const s   = status[t.name];
              const out = !isAlive(s.st);
              const pay = payoutLocked(s.st);
              return (
                <div key={t.name} className="grid px-3 py-2 items-center"
                  style={{gridTemplateColumns:"minmax(0,2fr) 0.8fr 0.5fr 0.9fr 1.2fr 0.6fr 0.7fr",gap:6,
                    fontSize:13,borderBottom:`1px solid ${C.line}`,opacity:out&&pay===0?0.55:1}}>
                  <span className="truncate">
                    <span style={{marginRight:6}}><Flag f={t.flag} /></span>
                    <b>{t.name}</b>
                    {s.w>=2 && isAlive(s.st) && <span style={{marginLeft:4,fontSize:12}}>🔥</span>}
                  </span>
                  <span style={{color:BIDDERS[t.owner].color,fontWeight:600,fontSize:12}}>{t.owner}</span>
                  <span style={{color:C.mute}}>${t.bid}</span>
                  <span style={{color:C.mute,fontSize:12}}>{s.p>0?`${s.w}-${s.d}-${s.l} (${s.pts})`:"—"}</span>
                  <span style={{fontSize:11,fontWeight:600,
                    color:s.st==="CH"?C.gold:out?C.red:C.green}}>
                    {STAGE_LABEL[s.st]}
                  </span>
                  <span className="text-right" style={{color:pay>0?C.gold:C.mute,fontWeight:pay>0?700:400}}>
                    {pay>0?`$${pay}`:"—"}
                  </span>
                  <span className="text-right">
                    <RoiBadge team={t} st={s.st} />
                  </span>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:11,color:C.mute,marginTop:8}}>
            ROI = locked payout ÷ bid price · 🎲 RANDOM = randomly allocated team · 🔥 = won 2+ group games · Click column headers to sort
          </div>
        </div>
      )}

      <div className="max-w-5xl mx-auto px-4 pb-8 pt-2" style={{fontSize:11,color:C.mute}}>
        WC26 Auction Pool · Patrick, Sunny, Sandeep & Ben · Scores via ESPN · Auto-updated by GitHub Actions
        <br/>* Max upside assumes every alive team wins the whole tournament — physically impossible but shows theoretical ceiling
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PoolDashboard />);
</script>
</body>
</html>
