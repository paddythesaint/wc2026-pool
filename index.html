// ─── Flag display (handles text abbreviations for subdivision flags) ──────────
function Flag({ f, size=16 }) {
  if (!f) return null;
  // Text abbreviations (ENG, SCT) rendered as styled badge
  if (f.length <= 4 && /^[A-Z]+$/.test(f)) return (
    <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",
      fontSize:9,fontWeight:800,letterSpacing:"0.05em",color:C.text,
      background:"#1E2E48",border:`1px solid ${C.line}`,borderRadius:3,
      padding:"1px 4px",minWidth:size,height:size,verticalAlign:"middle",lineHeight:1}}>
      {f}
    </span>
  );
  return <span style={{fontSize:size}}>{f}</span>;
}

// ─── ROI badge ────────────────────────────────────────────────────────────────
function RoiBadge({ team, st }) {
  if (team.random) return (
    <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.08em",color:C.mute,
      border:`1px solid ${C.line}`,borderRadius:3,padding:"1px 5px"}}>🎲 RANDOM</span>
  );
  const pay = payoutLocked(st);
  if (team.bid < 2) return null;
  const roi = pay / team.bid;
  const color = roi >= 3 ? C.green : roi >= 1 ? "#A8D8A8" : roi > 0 ? C.gold : !isAlive(st) ? C.red : C.mute;
  const label = roi >= 1 ? `${roi.toFixed(1)}×` : pay > 0 ? `${roi.toFixed(2)}×` : isAlive(st) ? "—" : "0×";
  return (
    <span style={{fontSize:10,fontWeight:700,letterSpacing:"0.06em",color,
      border:`1px solid ${color}22`,borderRadius:3,padding:"1px 6px",background:`${color}18`}}>
      {label}
    </span>
  );
}

// ─── Round-of-32 bracket panel ─────────────────────────────────────────────────
function BracketPanel({ status, knockoutFixtures }) {
  const top8 = React.useMemo(() => getCurrentThirdPlace(status).slice(0, 8), [status]);

  const tally = React.useMemo(() => {
    const t = Object.fromEntries(Object.keys(BIDDERS).map(o => [o, { h1: 0, h2: 0, wc: 0 }]));
    for (const g of Object.keys(GROUPS)) {
      const ranked = rankGroup(g, status);
      const winner = TEAMS.find(tm => tm.name === ranked[0].name);
      const runnerUp = TEAMS.find(tm => tm.name === ranked[1].name);
      const winnerHalf = isHalf1WinnerGroup(g) ? "h1" : "h2";
      const runnerUpHalf = isHalf1WinnerGroup(g) ? "h2" : "h1";
      if (winner) t[winner.owner][winnerHalf]++;
      if (runnerUp) t[runnerUp.owner][runnerUpHalf]++;
    }
    for (const r of top8) {
      const team = TEAMS.find(tm => tm.name === r.name);
      if (team) t[team.owner].wc++;
    }
    return t;
  }, [status, top8]);

  // A team's R32 fixture (once ESPN has it) tells us whether they've won or
  // lost that match - "won" highlights them as having advanced, "lost"
  // greys/strikes them out, and null (not played, or no fixture yet) leaves
  // the slot exactly as before. Updates automatically as results come in.
  const r32Fate = (teamName) => {
    const f = knockoutFixtures?.[teamName];
    if (!f || f.round !== "R32" || !f.completed) return null;
    return f.won ? "won" : "lost";
  };

  const TeamLine = ({ team, tag, fate }) => {
    const eliminated = fate === "lost";
    return (
      <div style={{fontSize:13,opacity:eliminated?0.55:1}}>
        <Flag f={team.flag} />
        <span style={{fontWeight:600,marginLeft:4,textDecoration:eliminated?"line-through":"none"}}>{team.name}</span>
        <span style={{fontSize:10,fontWeight:700,color:BIDDERS[team.owner].color,marginLeft:6}}>
          {BIDDERS[team.owner].short}
        </span>
        {tag && <span style={{fontSize:9,color:C.mute,marginLeft:4}}>{tag}</span>}
        {fate === "won" && <span style={{fontSize:9,fontWeight:700,color:C.green,marginLeft:4}}>ADVANCED</span>}
        {fate === "lost" && <span style={{fontSize:9,fontWeight:700,color:C.mute,marginLeft:4}}>OUT</span>}
      </div>
    );
  };

  const SlotDisplay = ({ slot, sibling }) => {
    if (slot.t === "WC") {
      const siblingTeam = sibling ? resolveSlot(sibling, status)?.team : null;
      const scheduled = siblingTeam ? knockoutFixtures?.[siblingTeam.name] : null;
      const drawnTeam = scheduled?.round === "R32" ? TEAMS.find(t => t.name === scheduled.opponent) : null;
      if (drawnTeam) {
        return <TeamLine team={drawnTeam} tag="(drawn)" fate={r32Fate(drawnTeam.name)} />;
      }
      const candidates = top8.filter(r => slot.pool.includes(r.group));
      return (
        <div style={{fontSize:12,color:C.mute}}>
          <span style={{fontStyle:"italic"}}>Wildcard</span>
          <span style={{fontSize:10}}> · pool {slot.pool.join("/")}</span>
          {candidates.length > 0 && (
            <div style={{fontSize:10,marginTop:2}}>
              possible: {candidates.map(c => c.name).join(", ")}
            </div>
          )}
        </div>
      );
    }
    const r = resolveSlot(slot, status);
    if (!r || !r.team) return <span style={{fontSize:12,color:C.mute}}>TBD</span>;
    return <TeamLine team={r.team} tag={r.projected ? "(proj.)" : null} fate={r32Fate(r.team.name)} />;
  };

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        {Object.entries(tally).map(([owner, c]) => (
          <div key={owner} style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 14px"}}>
            <div style={{...disp,fontSize:13,fontWeight:700,letterSpacing:"0.08em",color:BIDDERS[owner].color}}>
              {owner}
            </div>
            <div style={{fontSize:11,color:C.mute,marginTop:4}}>
              Half 1 <b style={{color:C.text}}>{c.h1}</b> · Half 2 <b style={{color:C.text}}>{c.h2}</b> · Wildcard <b style={{color:C.text}}>{c.wc}</b>
            </div>
          </div>
        ))}
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        {[1, 2].map(half => (
          <div key={half} style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
            <div className="px-3 py-2" style={{borderBottom:`1px solid ${C.line}`,background:"#16203A"}}>
              <span style={{...disp,fontSize:14,fontWeight:700,letterSpacing:"0.12em"}}>HALF {half}</span>
            </div>
            {BRACKET_HALVES[half].map((m, idx) => (
              <div key={idx} className="px-3 py-2"
                style={{borderBottom: idx < BRACKET_HALVES[half].length - 1 ? `1px solid ${C.line}` : "none"}}>
                <SlotDisplay slot={m.a} sibling={m.b} />
                <div style={{fontSize:9,color:C.mute,margin:"3px 0"}}>vs</div>
                <SlotDisplay slot={m.b} sibling={m.a} />
              </div>
            ))}
          </div>
        ))}
      </div>

      <KnockoutRoundsPanel knockoutFixtures={knockoutFixtures} />

      <div style={{fontSize:10,color:C.mute}}>
        Winner/runner-up slots use current group standings (marked <b>proj.</b> while that group still has games left - these can still change).
        The 8 wildcard berths go to the best 3rd-place teams; once FIFA's official Round-of-32 draw is published, the actual opponent appears
        marked <b>(drawn)</b> - until then, "possible" lists current top-8 third-place teams whose group is eligible for that slot.
        Once a Round of 32 match is final, the winner is marked <b style={{color:C.green}}>ADVANCED</b> and the loser is greyed out and marked <b>OUT</b>.
        Later rounds (Round of 16 onward) appear above automatically as soon as FIFA schedules them, with scores once played.
      </div>
    </div>
  );
}

// Round of 16 onward can't be templated in advance the way the Round-of-32
// draw can - each round's matchups only exist once the previous round's
// results are in and FIFA schedules the next fixtures. So unlike the R32
// grid above, this reads `knockoutFixtures` (ESPN's schedule) directly
// rather than any hardcoded bracket tree, and simply renders nothing for a
// round until ESPN actually has fixtures for it.
function KnockoutRoundsPanel({ knockoutFixtures }) {
  const ROUND_LABELS = { R16: "ROUND OF 16", QF: "QUARTERFINALS", SF: "SEMIFINALS", FINAL: "FINAL", "3RD_PLACE": "3RD PLACE MATCH" };
  const ROUNDS = ["R16", "QF", "SF", "FINAL", "3RD_PLACE"];

  const byRound = React.useMemo(() => {
    const out = Object.fromEntries(ROUNDS.map(r => [r, []]));
    const seen = new Set();
    for (const [name, info] of Object.entries(knockoutFixtures || {})) {
      if (!ROUNDS.includes(info.round)) continue;
      const key = info.round + "|" + [name, info.opponent].sort().join("|");
      if (seen.has(key)) continue;
      seen.add(key);
      const teamA = TEAMS.find(t => t.name === name);
      const teamB = TEAMS.find(t => t.name === info.opponent);
      if (!teamA || !teamB) continue;
      out[info.round].push({ teamA, teamB, info });
    }
    return out;
  }, [knockoutFixtures]);

  const activeRounds = ROUNDS.filter(r => byRound[r].length > 0);
  if (activeRounds.length === 0) return null;

  return (
    <div className="space-y-3">
      {activeRounds.map(round => (
        <div key={round} style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
          <div className="px-3 py-2" style={{borderBottom:`1px solid ${C.line}`,background:"#16203A"}}>
            <span style={{...disp,fontSize:14,fontWeight:700,letterSpacing:"0.12em"}}>{ROUND_LABELS[round]}</span>
          </div>
          {byRound[round].map(({ teamA, teamB, info }, idx) => (
            <div key={idx} className="px-3 py-2"
              style={{borderBottom: idx < byRound[round].length - 1 ? `1px solid ${C.line}` : "none"}}>
              {[[teamA, info.won, info.gf], [teamB, info.completed ? !info.won : null, info.ga]].map(([t, won, score], i) => (
                <div key={i} style={{fontSize:13,display:"flex",alignItems:"center",justifyContent:"space-between",
                  opacity: info.completed && !won ? 0.55 : 1, marginTop: i===1 ? 3 : 0}}>
                  <span>
                    <Flag f={t.flag} />
                    <span style={{fontWeight: won ? 700 : 600, marginLeft:4}}>{t.name}</span>
                    <span style={{fontSize:10,fontWeight:700,color:BIDDERS[t.owner].color,marginLeft:6}}>
                      {BIDDERS[t.owner].short}
                    </span>
                  </span>
                  {info.completed
                    ? <span style={{...disp,fontSize:13,fontWeight:700}}>{score}</span>
                    : <span style={{fontSize:9,color:C.mute}}>scheduled</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ─── Qualification-count history (chart + changelog) ──────────────────────────
// `qualHistory` is a list of {t, counts:{owner:count}} snapshots, appended by
// a GitHub Action only when a count actually changes - so consecutive entries
// always differ by at least one owner, which is what the changelog below relies on.
function QualificationHistoryPanel({ qualHistory }) {
  if (!qualHistory || qualHistory.length === 0) {
    return (
      <div style={{fontSize:11,color:C.mute}}>
        Tracking projected qualification counts as group results come in - check back after the next match finishes.
      </div>
    );
  }

  const owners = Object.keys(BIDDERS);
  const maxCount = Math.max(12, ...qualHistory.flatMap(h => owners.map(o => h.counts[o] || 0)));
  const W = 600, H = 140, PAD = 4;

  const fmtTime = (iso) => {
    try {
      return new Date(iso).toLocaleString("en-US", {
        month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZone:"America/New_York",
      }) + " ET";
    } catch { return iso; }
  };

  const changes = [];
  for (let i = qualHistory.length - 1; i >= 1; i--) {
    const cur = qualHistory[i].counts, prev = qualHistory[i-1].counts;
    const deltas = owners
      .map(o => ({ o, d: (cur[o]||0) - (prev[o]||0) }))
      .filter(x => x.d !== 0);
    if (deltas.length) changes.push({ t: qualHistory[i].t, deltas });
  }

  return (
    <div className="space-y-3">
      {qualHistory.length >= 2 && (
        <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 14px"}}>
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
            {owners.map(o => {
              const pts = qualHistory.map((h,i) => [
                qualHistory.length===1 ? 0 : (i/(qualHistory.length-1))*(W-2*PAD)+PAD,
                H-PAD - ((h.counts[o]||0)/maxCount)*(H-2*PAD),
              ]);
              const path = pts.map((p,i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
              return <path key={o} d={path} fill="none" stroke={BIDDERS[o].color} strokeWidth="2"/>;
            })}
          </svg>
          <div className="flex flex-wrap gap-3 mt-2">
            {owners.map(o => {
              const latest = qualHistory[qualHistory.length-1].counts[o] || 0;
              return (
                <span key={o} style={{fontSize:11,color:C.mute}}>
                  <span style={{color:BIDDERS[o].color,fontWeight:700}}>{BIDDERS[o].short}</span> {latest}
                </span>
              );
            })}
          </div>
        </div>
      )}

      <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
        <div className="px-3 py-2" style={{borderBottom:`1px solid ${C.line}`,background:"#16203A"}}>
          <span style={{...disp,fontSize:14,fontWeight:700,letterSpacing:"0.12em"}}>QUALIFICATION CHANGELOG</span>
        </div>
        {changes.length === 0 && (
          <div className="px-3 py-2" style={{fontSize:11,color:C.mute}}>No changes recorded yet.</div>
        )}
        {changes.map((c, idx) => (
          <div key={c.t} className="px-3 py-2"
            style={{borderBottom: idx < changes.length-1 ? `1px solid ${C.line}` : "none"}}>
            <div style={{fontSize:10,color:C.mute}}>{fmtTime(c.t)}</div>
            <div style={{fontSize:12,marginTop:2}}>
              {c.deltas.map(({o,d}, i) => (
                <span key={o}>
                  {i>0 && ", "}
                  <span style={{color:BIDDERS[o].color,fontWeight:700}}>{o}</span>{" "}
                  <b style={{color:d>0?C.green:C.red}}>{d>0?`+${d}`:d}</b>
                </span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function TitleOddsHistoryPanel({ titleOddsHistory }) {
  if (!titleOddsHistory || titleOddsHistory.length === 0) {
    return (
      <div style={{fontSize:11,color:C.mute}}>
        Tracking aggregate tournament-winner odds by owner - check back after tomorrow's snapshot.
      </div>
    );
  }

  const owners = Object.keys(BIDDERS);
  const maxProb = Math.max(0.1, ...titleOddsHistory.flatMap(h => owners.map(o => h.probs[o] || 0)));
  const W = 600, H = 140, PAD = 4;

  const fmtTime = (iso) => {
    try {
      return new Date(iso).toLocaleString("en-US", {
        month:"short", day:"numeric", hour:"numeric", minute:"2-digit", timeZone:"America/New_York",
      }) + " ET";
    } catch { return iso; }
  };
  const pct = (v) => `${(v*100).toFixed(1)}%`;

  const latest = titleOddsHistory[titleOddsHistory.length-1];
  const prev = titleOddsHistory.length >= 2 ? titleOddsHistory[titleOddsHistory.length-2] : null;
  const [expanded, setExpanded] = React.useState(null);

  return (
    <div className="space-y-3">
      <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 14px"}}>
        <div style={{...disp,fontSize:14,fontWeight:700,letterSpacing:"0.12em",marginBottom:8}}>
          AGGREGATE TITLE ODDS BY OWNER
        </div>
        {titleOddsHistory.length >= 2 && (
          <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
            {owners.map(o => {
              const pts = titleOddsHistory.map((h,i) => [
                titleOddsHistory.length===1 ? 0 : (i/(titleOddsHistory.length-1))*(W-2*PAD)+PAD,
                H-PAD - ((h.probs[o]||0)/maxProb)*(H-2*PAD),
              ]);
              const path = pts.map((p,i) => `${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
              return <path key={o} d={path} fill="none" stroke={BIDDERS[o].color} strokeWidth="2"/>;
            })}
          </svg>
        )}
        <div className="flex flex-wrap gap-3 mt-2">
          {owners.map(o => {
            const cur = latest.probs[o] || 0;
            const d = prev ? cur - (prev.probs[o] || 0) : 0;
            return (
              <span key={o} onClick={() => setExpanded(expanded===o ? null : o)}
                style={{fontSize:11,color:C.mute,cursor: latest.teams ? "pointer" : "default"}}>
                <span style={{color:BIDDERS[o].color,fontWeight:700}}>{BIDDERS[o].short}</span> {pct(cur)}
                {prev && Math.abs(d) >= 0.001 && (
                  <b style={{color:d>0?C.green:C.red,marginLeft:4}}>{d>0?"+":""}{(d*100).toFixed(1)}pp</b>
                )}
                {latest.teams && <span style={{marginLeft:3,opacity:0.5}}>{expanded===o ? "▲" : "▼"}</span>}
              </span>
            );
          })}
        </div>

        {expanded && latest.teams && (
          <div style={{marginTop:8,padding:"8px 10px",background:"#0E1830",borderRadius:6,fontSize:11}}>
            <div style={{color:C.mute,marginBottom:4}}>
              {expanded}'s teams (Polymarket "Yes" price = implied win probability):
            </div>
            {Object.entries(latest.teams)
              .filter(([team]) => TEAMS.find(t => t.name===team)?.owner === expanded)
              .sort((a,b) => b[1]-a[1])
              .map(([team,prob]) => (
                <div key={team} className="flex justify-between" style={{padding:"2px 0"}}>
                  <span>{team}</span>
                  <span style={{color:C.text}}>{pct(prob)}</span>
                </div>
              ))}
            <div className="flex justify-between" style={{borderTop:`1px solid ${C.line}`,marginTop:4,paddingTop:4,fontWeight:700}}>
              <span>Sum = {expanded}'s aggregate</span>
              <span>{pct(latest.probs[expanded]||0)}</span>
            </div>
          </div>
        )}

        <div style={{fontSize:10,color:C.mute,marginTop:8}}>
          <b>How this is calculated:</b> Polymarket's "World Cup Winner" market has one Yes/No
          contract per team. A contract's Yes price (0-1) is the market's live implied probability
          of that team winning the tournament - e.g. a $0.20 price means traders price in a 20%
          chance. Each owner's % is just the sum of their own teams' prices (valid since "team X
          wins" outcomes are mutually exclusive) - click an owner above to see the per-team prices
          behind their number. Snapshotted once daily (~11am ET) once Matchday 2 wraps up.
        </div>
      </div>
    </div>
  );
}

function ProjectedTournamentPanel({ status, groupSchedule, latestTeamPrices, payoutProjection, knockoutFixtures, runs = 6000 }) {
  const [matchupOverrides, setMatchupOverrides] = React.useState(loadMatchupOverrides);

  const toggleOverride = (key, team) => {
    const next = { ...matchupOverrides };
    if (next[key] === team) delete next[key];
    else next[key] = team;
    setMatchupOverrides(next);
    saveMatchupOverrides(next);
  };
  const resetAll = () => { setMatchupOverrides({}); saveMatchupOverrides({}); };
  const overrideCount = Object.keys(matchupOverrides).length;

  const strengthOf = React.useMemo(
    () => latestTeamPrices ? makeStrengthOf(latestTeamPrices, {}) : null,
    [latestTeamPrices]
  );

  const projected = React.useMemo(
    () => strengthOf ? buildProjectedBracket(status, groupSchedule, strengthOf, matchupOverrides, knockoutFixtures) : null,
    [status, groupSchedule, strengthOf, matchupOverrides, knockoutFixtures]
  );

  const yourPayout = React.useMemo(() => {
    if (!projected) return null;
    const totals = Object.fromEntries(Object.keys(BIDDERS).map(o => [o, 0]));
    for (const t of TEAMS) totals[t.owner] += FINAL_PAYOUT[projected.stage[t.name]] ?? 0;
    return totals;
  }, [projected]);

  // Prefer the large nightly server-side simulation (run once after each
  // day's matches finish - see scripts/run_payout_projection.js) over a live
  // client-side run, falling back to the latter only until that first
  // nightly run has landed.
  const liveSummary = React.useMemo(() => {
    if (payoutProjection || !groupSchedule || groupSchedule.length === 0 || !strengthOf) return null;
    const ownerPayouts = runPayoutSimulations(status, groupSchedule, strengthOf, runs, knockoutFixtures);
    return summarizePayouts(ownerPayouts);
  }, [payoutProjection, status, groupSchedule, strengthOf, runs, knockoutFixtures]);

  const summary = payoutProjection ? payoutProjection.summary : liveSummary;
  const simRuns = payoutProjection ? payoutProjection.runs : runs;

  if (!summary || !projected) {
    return (
      <div style={{fontSize:11,color:C.mute}}>
        Loading the group-stage schedule and title odds needed to run payout projections…
      </div>
    );
  }

  const maxMean = Math.max(1, ...Object.entries(summary).map(([o, s]) => Math.max(s.p75, yourPayout[o] || 0)));
  const owners = Object.keys(BIDDERS).sort((a, b) => summary[b].mean - summary[a].mean);

  // ── Bracket tree geometry ──────────────────────────────────────────────
  // Classic CSS bracket trick: every round column is the same fixed height
  // and uses justify-content:space-around, so a round-r match's vertical
  // center is always exactly the midpoint of the two round-(r-1) matches
  // that feed it - no JS layout/measurement needed. Half 2 is rendered as a
  // mirror image (scaleX(-1) on the half, scaleX(-1) again on each team row
  // to un-flip the text) so both halves visually converge on the final in
  // the middle, like a real printed bracket.
  const TREE_GAP = 22, BOX_W = 116, HALF_H = 460;

  const TeamRow = ({ team, matchKey, isWinner, final, mirrored }) => {
    const t = TEAMS.find(x => x.name === team);
    const forced = matchupOverrides[matchKey] === team;
    return (
      <div onClick={() => !final && toggleOverride(matchKey, team)}
        style={{
          transform: mirrored ? "scaleX(-1)" : undefined,
          display:"flex", alignItems:"center", gap:4, fontSize:10, padding:"2px 5px",
          cursor: final ? "default" : "pointer", borderRadius:4, lineHeight:1.3,
          background: isWinner ? "#16203A" : "transparent",
          color: isWinner ? C.text : C.mute,
          border: forced ? `1px solid ${C.gold}` : "1px solid transparent",
          fontWeight: isWinner ? 700 : 400,
        }}>
        <span style={{width:3,height:11,borderRadius:2,flexShrink:0,background:t?BIDDERS[t.owner].color:C.mute}} />
        <Flag f={t?.flag} size={12} />
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{team}</span>
      </div>
    );
  };

  const MatchBox = ({ m, roundIndex, isLast, matchesInRound, idx, mirrored }) => {
    const vertPx = HALF_H / (2 * matchesInRound);
    return (
      <div style={{position:"relative", width:BOX_W, background:C.panel,
        border:`1px solid ${m.final ? C.green : C.line}`, borderRadius:6, padding:3}}
        title={m.final ? "Actual result - already decided" : "Odds-based projection"}>
        {roundIndex > 0 && (
          <div style={{position:"absolute", left:-TREE_GAP/2, top:"50%", width:TREE_GAP/2, height:1, background:C.line}} />
        )}
        <TeamRow team={m.a} matchKey={m.key} isWinner={m.winner===m.a} final={m.final} mirrored={mirrored} />
        <TeamRow team={m.b} matchKey={m.key} isWinner={m.winner===m.b} final={m.final} mirrored={mirrored} />
        {!isLast && (
          <>
            <div style={{position:"absolute", right:-TREE_GAP/2, top:"50%", width:TREE_GAP/2, height:1, background:C.line}} />
            <div style={{position:"absolute", right:-TREE_GAP/2, width:1, background:C.line,
              top: idx % 2 === 0 ? "50%" : `calc(50% - ${vertPx}px)`, height:vertPx}} />
          </>
        )}
        {isLast && (
          <div style={{position:"absolute", right:-TREE_GAP, top:"50%", width:TREE_GAP, height:1, background:C.line}} />
        )}
      </div>
    );
  };

  const HalfTree = ({ half, mirrored }) => (
    <div style={{display:"flex", gap:TREE_GAP, height:HALF_H, transform: mirrored ? "scaleX(-1)" : undefined}}>
      {half.rounds.map((matches, ri) => (
        <div key={ri} style={{display:"flex", flexDirection:"column", justifyContent:"space-around", height:"100%"}}>
          {matches.map((m, idx) => (
            <MatchBox key={m.key} m={m} roundIndex={ri} isLast={ri === half.rounds.length - 1}
              matchesInRound={matches.length} idx={idx} mirrored={mirrored} />
          ))}
        </div>
      ))}
    </div>
  );

  const FinalColumn = ({ finalMatch, thirdMatch }) => (
    <div style={{position:"relative", width:BOX_W, height:HALF_H}}>
      <div style={{position:"absolute", top:"50%", left:"50%", transform:"translate(-50%,-50%)", width:BOX_W,
        background:C.panel, border:`1px solid ${finalMatch.final ? C.green : C.gold}`, borderRadius:6, padding:3}}
        title={finalMatch.final ? "Actual result - already decided" : "Odds-based projection"}>
        <TeamRow team={finalMatch.a} matchKey={finalMatch.key} isWinner={finalMatch.winner===finalMatch.a} final={finalMatch.final} />
        <TeamRow team={finalMatch.b} matchKey={finalMatch.key} isWinner={finalMatch.winner===finalMatch.b} final={finalMatch.final} />
      </div>
      <div style={{position:"absolute", bottom:0, left:"50%", transform:"translateX(-50%)", width:BOX_W, textAlign:"center"}}>
        <div style={{fontSize:8,color:C.mute,letterSpacing:"0.1em",marginBottom:3}}>3RD PLACE</div>
        <div style={{background:C.panel,border:`1px solid ${thirdMatch.final ? C.green : C.line}`,borderRadius:6,padding:3}}
          title={thirdMatch.final ? "Actual result - already decided" : "Odds-based projection"}>
          <TeamRow team={thirdMatch.a} matchKey={thirdMatch.key} isWinner={thirdMatch.winner===thirdMatch.a} final={thirdMatch.final} />
          <TeamRow team={thirdMatch.b} matchKey={thirdMatch.key} isWinner={thirdMatch.winner===thirdMatch.b} final={thirdMatch.final} />
        </div>
      </div>
    </div>
  );

  const ROUND_LABELS = ["ROUND OF 32", "ROUND OF 16", "QUARTERFINAL", "SEMIFINAL"];
  const treeLabels = [...ROUND_LABELS, "FINAL", ...ROUND_LABELS.slice().reverse()];

  return (
    <div className="space-y-3">
      <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 14px"}}>
        <div className="flex items-center justify-between" style={{marginBottom:8}}>
          <span style={{...disp,fontSize:14,fontWeight:700,letterSpacing:"0.12em"}}>
            PROJECTED PAYOUT BY OWNER
          </span>
          <span style={{fontSize:10,color:C.mute}}>
            {simRuns.toLocaleString()} simulated tournaments
            {payoutProjection && ` · updated ${new Date(payoutProjection.generated).toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}`}
          </span>
        </div>

        <div className="flex flex-wrap gap-3" style={{fontSize:9,color:C.mute,marginBottom:8}}>
          <span><span style={{display:"inline-block",width:8,height:8,background:C.text,opacity:0.5,marginRight:3}}/>median</span>
          <span><span style={{display:"inline-block",width:8,height:8,background:C.gold,marginRight:3}}/>your bracket below</span>
        </div>

        {owners.map(o => {
          const s = summary[o];
          const mine = yourPayout[o];
          return (
            <div key={o} className="mb-3">
              <div className="flex items-baseline justify-between">
                <span style={{fontSize:12,fontWeight:700,color:BIDDERS[o].color}}>{o}</span>
                <span style={{fontSize:11,color:C.mute}}>
                  expected <b style={{color:C.text}}>${s.mean.toFixed(0)}</b> · your bracket <b style={{color:C.gold}}>${mine}</b>
                </span>
              </div>
              <div style={{position:"relative",height:14,background:"#0E1830",borderRadius:5,marginTop:4}}>
                <div style={{position:"absolute",left:`${s.p25/maxMean*100}%`,width:`${(s.p75-s.p25)/maxMean*100}%`,
                  height:"100%",background:BIDDERS[o].color,opacity:0.35,borderRadius:5}} />
                <div style={{position:"absolute",left:`${s.median/maxMean*100}%`,width:2,height:"100%",background:C.text,opacity:0.5}} />
                <div title={`Your overridden bracket: $${mine}`}
                  style={{position:"absolute",left:`calc(${mine/maxMean*100}% - 4px)`,top:-2,width:0,height:0,
                    borderLeft:"4px solid transparent",borderRight:"4px solid transparent",borderTop:`6px solid ${C.gold}`}} />
              </div>
              <div style={{fontSize:9,color:C.mute,marginTop:2}}>
                p25-p75 range: ${s.p25.toFixed(0)} - ${s.p75.toFixed(0)}
              </div>
            </div>
          );
        })}

        <div style={{fontSize:10,color:C.mute,marginTop:8}}>
          <b>How this is calculated:</b> the bars are a Monte Carlo simulation - each team's strength is its
          latest Polymarket title-win price, used in a Bradley-Terry model (P(A beats B) ≈
          strength_A / (strength_A+strength_B)) with a draw chance in group matches only. We replay the
          remaining group matches and the entire knockout bracket {runs.toLocaleString()} times and tally each
          owner's $ payout every time - the shaded bar is the middle 50% of those outcomes (p25-p75), the thin
          line is the median. The gold triangle is the exact payout for the single bracket below (the model's
          favorite at every matchup, or your override where you've clicked one) - not an average, one specific outcome.
        </div>
      </div>

      <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,padding:"10px 14px"}}>
        <div className="flex items-center justify-between" style={{marginBottom:4}}>
          <span style={{...disp,fontSize:14,fontWeight:700,letterSpacing:"0.12em"}}>ODDS-BASED BRACKET</span>
          {overrideCount > 0 && (
            <button onClick={resetAll} style={{fontSize:10,color:C.red,background:"none",border:"none",cursor:"pointer"}}>
              Reset {overrideCount} override{overrideCount>1?"s":""}
            </button>
          )}
        </div>
        <div style={{fontSize:10,color:C.mute,marginBottom:8}}>
          Each matchup defaults to whichever team has the better title-win price. Click a team to force them through that matchup -
          saved only in your browser, never shared with other pool members. The colored bar on each team is their owner;
          a <span style={{color:C.green}}>green border</span> means that match has already actually been played and locks in the real result.
        </div>

        <div style={{overflowX:"auto", paddingBottom:6}}>
          <div style={{display:"flex", gap:TREE_GAP, width:"max-content", marginBottom:6}}>
            {treeLabels.map((label, i) => (
              <div key={i} style={{width:BOX_W,fontSize:8,color:C.mute,letterSpacing:"0.08em",textAlign:"center"}}>{label}</div>
            ))}
          </div>
          <div style={{display:"flex", gap:TREE_GAP, width:"max-content"}}>
            <HalfTree half={projected.half1} mirrored={false} />
            <FinalColumn finalMatch={projected.finalMatch} thirdMatch={projected.thirdMatch} />
            <HalfTree half={projected.half2} mirrored={true} />
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Scenario bar ─────────────────────────────────────────────────────────────
function ScenarioBar({ floor, ceiling, spent }) {
  const BAR_MAX = 700; // visual ceiling for bar scale
  const floorPct   = Math.min(100, (floor   / BAR_MAX) * 100);
  const ceilingPct = Math.min(100, (ceiling / BAR_MAX) * 100);
  const netFloor   = floor - spent;
  const netCeil    = ceiling - spent;
  return (
    <div style={{padding:"6px 16px 10px"}}>
      <div className="flex items-center justify-between mb-1">
        <span style={{fontSize:10,letterSpacing:"0.1em",color:C.mute,...disp,fontWeight:600}}>SCENARIO RANGE</span>
        <span style={{fontSize:11,color:C.mute}}>
          <span style={{color:netFloor>=0?C.green:C.red,fontWeight:600}}>
            {netFloor>=0?"+":"-"}${Math.abs(netFloor)}
          </span>
          <span style={{color:C.mute}}> floor · </span>
          <span style={{color:netCeil>=0?C.green:C.text,fontWeight:600}}>
            {netCeil>=0?"+":"-"}${Math.abs(netCeil)}
          </span>
          <span style={{color:C.mute}}> max upside *</span>
        </span>
      </div>
      <div style={{height:6,background:"#1A2438",borderRadius:99,overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",
          width:`${ceilingPct}%`,background:`${C.gold}30`,borderRadius:99}}/>

// ─── Upsets ─────────────────────────────────────────────────────────────────
// An "upset" is a completed match where the actual outcome (home/away win or
// draw) was less likely than not according to the closing betting line.
const UPSET_THRESHOLD = 0.5; // actual outcome's closing probability below this

function computeUpsets(oddsHistory) {
  const list = [];
  for (const [id, m] of Object.entries(oddsHistory||{})) {
    if (!m.result || !m.closing) continue;
    const A = findTeam(m.a), B = findTeam(m.b);
    if (!A || !B) continue;
    const key = m.result.winner === "home" ? "h" : m.result.winner === "away" ? "a" : "d";
    const prob = m.closing[key];
    if (prob == null || prob >= UPSET_THRESHOLD) continue;

    // Points actually earned vs. what the closing odds implied each team
    // should expect on average (win=3, draw=1, loss=0) - this is what lets
    // a draw "upset" credit the underdog instead of going unattributed,
    // since they picked up a point the market said they were unlikely to get.
    const { h, d, a } = m.closing;
    const ptsHome = m.result.winner === "home" ? 3 : m.result.winner === "draw" ? 1 : 0;
    const ptsAway = m.result.winner === "away" ? 3 : m.result.winner === "draw" ? 1 : 0;
    const swingHome = ptsHome - (h*3 + d*1);
    const swingAway = ptsAway - (a*3 + d*1);
    const benefitSwing = Math.max(swingHome, swingAway);
    // Only credit a team when they actually beat the market's expected
    // points, not just edged out the other side by a fraction of a point
    // (e.g. a draw between two closely-matched sides isn't really "an upset
    // someone benefited from").
    const benefitTeam = benefitSwing > 0.05 ? (swingHome > swingAway ? A : B) : null;

    list.push({
      id, a: A, b: B, hs: m.result.hs, as: m.result.as, winner: m.result.winner,
      benefitTeam, benefitSwing, prob, surprise: 1 - prob, date: m.date,
    });
  }
  return list.sort((x,y) => y.surprise - x.surprise);
}

function UpsetsPanel({ oddsHistory }) {
  const upsets = React.useMemo(() => computeUpsets(oddsHistory), [oddsHistory]);

function espnDate(isoStr) {
  return new Date(isoStr).toLocaleDateString("en-US",{timeZone:"America/New_York",month:"short",day:"numeric"});
}
function espnTime(isoStr) {
  return new Date(isoStr).toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"numeric",minute:"2-digit",timeZoneName:"short"});
}
function parseML(v) {
  if (v == null) return null;
  const n = parseInt(String(v).replace("+",""),10);
  return isNaN(n) ? null : n;
}
function extractOddsLive(comp) {
  const o = (comp.odds||[])[0]; if (!o) return null;
  const ml = o.moneyline||{};
  const hv = parseML(ml.home?.close?.odds);
  const av = parseML(ml.away?.close?.odds);
  const dv = parseML(ml.draw?.close?.odds) ?? parseML(o.drawOdds?.moneyLine);
  if (hv == null || av == null) return null;
  const p = x => x < 0 ? Math.abs(x)/(Math.abs(x)+100) : 100/(x+100);
  const h=p(hv), a=p(av), d=dv!=null?p(dv):Math.max(0.05,1-h-a), t=h+a+d;
  return {home:Math.round(h/t*100)/100,draw:Math.round(d/t*100)/100,away:Math.round(a/t*100)/100};
}
function etDay(offsetMs=0) {
  return new Date(Date.now()+offsetMs)
    .toLocaleDateString("en-CA",{timeZone:"America/New_York"}).replace(/-/g,"");
}
async function fetchESPN() {
  const dates = [etDay(-864e5), etDay(), etDay(864e5)];
  const all = [];
  for (const dateStr of dates) {
    try {
      const r  = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}&t=${Date.now()}`);
      const ev = (await r.json()).events || [];
      for (const e of ev) {
        const comp = e.competitions?.[0]; if (!comp) continue;
        const cs   = comp.competitors||[]; if (cs.length<2) continue;
        const home = cs.find(c=>c.homeAway==="home")||cs[0];
        const away = cs.find(c=>c.homeAway==="away")||cs[1];
        const st   = comp.status?.type||{};
        const done = st.completed||false;
        const live = st.state==="in"||(st.name||"").toLowerCase().includes("halftime");
        const score= done||live ? `${home.score??0}-${away.score??0}` : "";
        const k    = live?"LIVE":done?"":espnTime(e.date);
        const note = (comp.altGameNote||"").replace(/FIFA World Cup,?\s*/g,"").trim();
        const odds = done||live ? null : extractOddsLive(comp);
        const fx   = {d:espnDate(e.date),k,a:home.team?.displayName||"",b:away.team?.displayName||"",s:score,g:note,id:e.id};
        if (odds) fx.odds = odds;
        all.push(fx);
      }
    } catch(_) {}
  }
  return all;
}

// ─── Live standings + H2H (computed client-side from ESPN, no backend needed) ─
const TOURNAMENT_START_DATE = new Date("2026-06-11T00:00:00Z");
const H2H_PLAYERS = ["Ben","Patrick","Sandeep","Sunny"];

function blankH2H() {
  const h2h = {};
  for (let i = 0; i < H2H_PLAYERS.length; i++)
    for (let j = i+1; j < H2H_PLAYERS.length; j++)
      h2h[`${H2H_PLAYERS[i]}|${H2H_PLAYERS[j]}`] = [0,0,0];
  return h2h;
}

async function fetchAllEspnEvents() {
  const dates = [];
  const end = new Date(Date.now() + 864e5);
  for (let d = new Date(TOURNAMENT_START_DATE); d <= end; d = new Date(d.getTime()+864e5)) {
    dates.push(d.toISOString().slice(0,10).replace(/-/g,""));
  }
  const dayResults = await Promise.all(dates.map(d =>
    fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${d}&t=${Date.now()}`)
      .then(r => r.json()).then(j => j.events || []).catch(() => [])
  ));
  const byId = new Map();
  for (const events of dayResults) for (const ev of events) byId.set(ev.id, ev);
  return [...byId.values()];
}

// Once group standings are final, FIFA's official Round-of-32 schedule (who
// plays whom) already exists in ESPN's data even before kickoff - this looks
// ahead ~10 days to pick up those scheduled-but-not-yet-played knockout
// fixtures, so a "wildcard" bracket slot's real opponent can be shown as soon
// as it's been drawn, instead of just listing the pool of possible teams.
// The backward bound goes all the way to tournament start (not just
// "yesterday") - otherwise a completed knockout result ages out of the
// window after a day and its ADVANCED/OUT and "(drawn)" tags would vanish
// even though the result is still the one that matters.
async function fetchKnockoutFixtures() {
  const dates = [];
  const start = new Date(TOURNAMENT_START_DATE);
  const end = new Date(Date.now() + 864e5 * 10);
  for (let d = new Date(start); d <= end; d = new Date(d.getTime()+864e5)) {
    dates.push(d.toISOString().slice(0,10).replace(/-/g,""));
  }
  const dayResults = await Promise.all(dates.map(d =>
    fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${d}&t=${Date.now()}`)
      .then(r => r.json()).then(j => j.events || []).catch(() => [])
  ));
  const byId = new Map();
  for (const events of dayResults) for (const ev of events) byId.set(ev.id, ev);

  const map = {};
  for (const ev of byId.values()) {
    const comp = ev.competitions?.[0]; if (!comp) continue;
    const round = detectKnockoutRound(ev, comp);
    if (!round) continue;
    const cs = comp.competitors || []; if (cs.length < 2) continue;
    const home = cs.find(c => c.homeAway === "home") || cs[0];
    const away = cs.find(c => c.homeAway === "away") || cs[1];
    const A = findTeam(home.team?.displayName);
    const B = findTeam(away.team?.displayName);
    if (!A || !B) continue;
    const completed = !!comp.status?.type?.completed;
    const ga = Number(home.score ?? 0), gb = Number(away.score ?? 0);
    const aWon = completed
      ? ((typeof home.winner === "boolean" || typeof away.winner === "boolean") ? !!home.winner : ga > gb)
      : null;
    map[A.name] = { opponent: B.name, round, completed, date: ev.date, gf: ga, ga: gb, won: aWon };
    map[B.name] = { opponent: A.name, round, completed, date: ev.date, gf: gb, ga: ga, won: completed ? !aWon : null };
  }
  return map;
}

function computeStandingsAndH2H(events) {
  const status = blankStatus();
  const h2h = blankH2H();
  for (const ev of events) {
    const comp = ev.competitions?.[0]; if (!comp) continue;
    const cs   = comp.competitors||[]; if (cs.length<2) continue;
    if (!comp.status?.type?.completed) continue;
    const home = cs.find(c=>c.homeAway==="home")||cs[0];
    const away = cs.find(c=>c.homeAway==="away")||cs[1];
    const A = findTeam(home.team?.displayName);
    const B = findTeam(away.team?.displayName);
    if (!A || !B) continue;
    const ga = Number(home.score ?? 0), gb = Number(away.score ?? 0);

    if ((ev.season?.slug||"").toLowerCase().includes("group")) {
      for (const [t, gf, gc] of [[A,ga,gb],[B,gb,ga]]) {
        const s = status[t.name];
        s.p++; s.gf += gf; s.ga += gc;
        if (gf>gc) { s.w++; s.pts+=3; }
        else if (gf===gc) { s.d++; s.pts+=1; }
        else s.l++;
      }
    }

    if (A.owner !== B.owner) {
      const [o1,o2] = A.owner < B.owner ? [A.owner,B.owner] : [B.owner,A.owner];
      const [wa,wb] = A.owner < B.owner ? [ga,gb] : [gb,ga];
      const key = `${o1}|${o2}`;
      if (wa>wb) h2h[key][0]++;
      else if (wa<wb) h2h[key][2]++;
      else h2h[key][1]++;
    }
  }
  applyGroupStageElimination(status);
  applyKnockoutResults(status, events);
  return { status, h2h };
}

// Knockout round detection: ESPN labels each fixture's round in altGameNote
// (e.g. "Round of 32 · Houston"), same field already used for the Fixtures
// tab's "Group A · Mexico City" captions. Order matters - "semifinal" and
// "quarterfinal" both contain "final", so check the more specific rounds first.
const KNOCKOUT_ROUND_PATTERNS = [
  ["3RD_PLACE", /third[- ]place/i],
  ["SF",        /semi[- ]?final/i],
  ["QF",        /quarter[- ]?final/i],
  ["R16",       /round of 16/i],
  ["R32",       /round of 32/i],
  ["FINAL",     /\bfinal\b/i],
];
const KNOCKOUT_ORDER   = ["R32","R16","QF","SF","FINAL","3RD_PLACE"];
// Mirrors ALIVE_FLOOR/FINAL_PAYOUT: a winner advances to the next alive stage,
// a loser locks in their final payout stage. SF losers stay at "SF" (still
// alive at the $50 floor) until the 3rd-place match resolves "3RD" vs "4TH".
const KNOCKOUT_OUTCOME = {
  R32:         { win: "R16", lose: "E32" },
  R16:         { win: "QF",  lose: "E16" },
  QF:          { win: "SF",  lose: "EQF" },
  SF:          { win: "F",   lose: "SF"  },
  FINAL:       { win: "CH",  lose: "RU"  },
  "3RD_PLACE": { win: "3RD", lose: "4TH" },
};

function detectKnockoutRound(ev, comp) {
  const text = `${comp.altGameNote||""} ${ev.season?.slug||""} ${ev.name||""}`;
  for (const [key, re] of KNOCKOUT_ROUND_PATTERNS) if (re.test(text)) return key;
  return null;
}

function applyKnockoutResults(status, events) {
  const byRound = Object.fromEntries(KNOCKOUT_ORDER.map(r => [r, []]));
  for (const ev of events) {
    const comp = ev.competitions?.[0]; if (!comp) continue;
    if (!comp.status?.type?.completed) continue;
    const round = detectKnockoutRound(ev, comp);
    if (round) byRound[round].push(ev);
  }
  // Process in bracket order so a team's stage always ends up at the most
  // advanced round actually reached, regardless of fetch/event ordering.
  for (const round of KNOCKOUT_ORDER) {
    for (const ev of byRound[round]) {
      const comp  = ev.competitions[0];
      const cs    = comp.competitors||[];
      const home  = cs.find(c=>c.homeAway==="home")||cs[0];
      const away  = cs.find(c=>c.homeAway==="away")||cs[1];
      const A = findTeam(home.team?.displayName);
      const B = findTeam(away.team?.displayName);
      if (!A || !B) continue;
      const aWon = (typeof home.winner === "boolean" || typeof away.winner === "boolean")
        ? !!home.winner
        : Number(home.score||0) > Number(away.score||0);
      const outcome = KNOCKOUT_OUTCOME[round];
      status[A.name].st = aWon ? outcome.win  : outcome.lose;
      status[B.name].st = aWon ? outcome.lose : outcome.win;
    }
  }
}

// Once a group's 4 teams have each played all 3 group matches, rank 1-2 advance
// to R32 and rank 4 is eliminated immediately. Rank 3 (3rd place) is provisional
// until every group has finished, since the 2026 format also advances the best
// 8 third-place finishers across all 12 groups.
function applyGroupStageElimination(status) {
  const groupRows = {};
  for (const [g, names] of Object.entries(GROUPS)) {
    groupRows[g] = names
      .map(name => {
        const s = status[name];
        return { name, p: s.p, pts: s.pts, gd: s.gf - s.ga, gf: s.gf };
      })
      .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name));
  }

  const thirdPlace = [];
  for (const rows of Object.values(groupRows)) {
    const complete = rows.every(r => r.p >= 3);
    if (!complete) continue;
    rows.forEach((r, idx) => {
      if (idx < 2)      status[r.name].st = "R32";
      else if (idx === 3) status[r.name].st = "EG";
      else                thirdPlace.push(r);
    });
  }

  const allGroupsComplete = Object.values(groupRows).every(rows => rows.every(r => r.p >= 3));
  if (allGroupsComplete) {
    thirdPlace
      .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.name.localeCompare(b.name))
      .forEach((r, idx) => { status[r.name].st = idx < 8 ? "R32" : "EG"; });
  }
}

// Live "best 3rd-placed teams" cross-group leaderboard (mirrors the official
// in-tournament table) - whoever currently sits 3rd in their own group, win
// or lose, ranked head-to-head against the other 11 groups' current 3rd-place
// teams. Unlike applyGroupStageElimination's final cutoff (which only locks
// once every group has played all 3 matches), this updates continuously so
// the race for the 8 wildcard spots is visible mid-group-stage too.
function getCurrentThirdPlace(status) {
  return Object.entries(GROUPS).map(([letter, names]) => {
    const ranked = names
      .map(name => ({ name, s: status[name] }))
      .sort((a,b) => b.s.pts-a.s.pts || (b.s.gf-b.s.ga)-(a.s.gf-a.s.ga) || b.s.gf-a.s.gf || a.name.localeCompare(b.name));
    const third = ranked[2];
    return { group: letter, name: third.name, s: third.s };
  }).sort((a,b) =>
    b.s.pts-a.s.pts ||
    (b.s.gf-b.s.ga)-(a.s.gf-a.s.ga) ||
    b.s.gf-a.s.gf ||
    a.name.localeCompare(b.name)
  );
}

// ─── Round-of-32 bracket template (fixed by FIFA regardless of who actually
// qualifies) ─────────────────────────────────────────────────────────────────
// A group's winner and runner-up are always routed to opposite halves of the
// draw, so they can only meet again in the final. Winners of these 6 groups
// land in Half 1; the other 6 groups' winners land in Half 2 (and each
// group's runner-up lands in whichever half its own winner did NOT).
const HALF1_WINNER_GROUPS = ["D","E","F","G","H","I"];
const isHalf1WinnerGroup  = g => HALF1_WINNER_GROUPS.includes(g);

// The 16 R32 matchups, split by half. "W"/"RU" slots resolve to a specific
// team from current group standings; "WC" slots are one of the 8 wildcard
// (best 3rd-place) berths - which exact team lands in which WC slot isn't
// knowable until the full third-place field is set (FIFA assigns those via
// an official lookup table keyed on which 8 of 12 groups' thirds advance),
// so we only show the pool of groups eligible for that slot.
const BRACKET_HALVES = {
  1: [
    { a:{t:"RU",g:"A"},               b:{t:"RU",g:"B"} },
    { a:{t:"W", g:"E"},               b:{t:"WC",pool:["A","B","C","D","F"]} },
    { a:{t:"W", g:"F"},               b:{t:"RU",g:"C"} },
    { a:{t:"W", g:"I"},               b:{t:"WC",pool:["C","D","F","G","H"]} },
    { a:{t:"W", g:"D"},               b:{t:"WC",pool:["B","E","F","I","J"]} },
    { a:{t:"W", g:"G"},               b:{t:"WC",pool:["A","E","H","I","J"]} },
    { a:{t:"RU",g:"K"},               b:{t:"RU",g:"L"} },
    { a:{t:"W", g:"H"},               b:{t:"RU",g:"J"} },
  ],
  2: [
    { a:{t:"W", g:"C"},               b:{t:"RU",g:"F"} },
    { a:{t:"RU",g:"E"},               b:{t:"RU",g:"I"} },
    { a:{t:"W", g:"A"},               b:{t:"WC",pool:["C","E","F","H","I"]} },
    { a:{t:"W", g:"L"},               b:{t:"WC",pool:["E","H","I","J","K"]} },
    { a:{t:"W", g:"B"},               b:{t:"WC",pool:["E","F","G","I","J"]} },
    { a:{t:"W", g:"J"},               b:{t:"RU",g:"H"} },
    { a:{t:"W", g:"K"},               b:{t:"WC",pool:["D","E","I","J","L"]} },
    { a:{t:"RU",g:"D"},               b:{t:"RU",g:"G"} },
  ],
};

function rankGroup(letter, status) {
  return GROUPS[letter]
    .map(name => ({ name, s: status[name] }))
    .sort((a,b) => b.s.pts-a.s.pts || (b.s.gf-b.s.ga)-(a.s.gf-a.s.ga) || b.s.gf-a.s.gf || a.name.localeCompare(b.name));
}

// Resolves a bracket slot to a concrete team using current (possibly
// incomplete) group standings. `projected` flags that the group hasn't
// finished all 3 matches yet, so this slot could still change.
function resolveSlot(slot, status) {
  if (slot.t === "WC") return null;
  const ranked = rankGroup(slot.g, status);
  const idx = slot.t === "W" ? 0 : 1;
  const row = ranked[idx];
  const team = TEAMS.find(t => t.name === row.name);
  const projected = ranked.some(r => r.s.p < 3);
  return { team, projected };
}

// ─── Monte Carlo payout projection ────────────────────────────────────────────
// Strength model: a team's Polymarket "World Cup Winner" Yes-price (from the
// daily title-odds snapshot) is used as a Bradley-Terry strength score -
// P(A beats B) ≈ strength_A/(strength_A+strength_B). Local override
// multipliers (per-device, never shared/synced) let a player nudge a team's
// strength up or down if they disagree with what the market is pricing in.
const STRENGTH_FLOOR = 0.002;

function makeStrengthOf(latestTeamPrices, overrides) {
  return (name) => {
    const base = Math.max(STRENGTH_FLOOR, latestTeamPrices?.[name] ?? STRENGTH_FLOOR);
    const mult = overrides?.[name] ?? 1;
    return Math.max(STRENGTH_FLOOR / 4, base * mult);
  };
}

const GROUP_BASE_DRAW = 0.28;

// Group matches can draw; knockout matches can't. `r` is A's Bradley-Terry win
// share - draw odds peak (at GROUP_BASE_DRAW) when r≈0.5 and shrink as the
// mismatch grows, floored at 0.18 so heavy favorites still can't fully rule a draw out.
function simulateGroupMatch(a, b, strengthOf) {
  const sa = strengthOf(a), sb = strengthOf(b);
  const r = sa / (sa + sb);
  const d = Math.min(GROUP_BASE_DRAW, Math.max(0.18, GROUP_BASE_DRAW - Math.abs(r - 0.5) * 0.6));
  const x = Math.random();
  if (x < d) return "draw";
  return x < d + (1 - d) * r ? "a" : "b";
}

function makeProbWin(strengthOf) {
  return (a, b) => {
    const sa = strengthOf(a), sb = strengthOf(b);
    return sa / (sa + sb);
  };
}

// Returns the real, already-decided winner of a knockout match if ESPN's
// schedule shows that exact A-vs-B matchup at that round as completed -
// otherwise null. Consulted ahead of any random/strength-based guess so
// real results are never silently overridden in projections or simulations.
function realKnockoutWinner(a, b, round, knockoutFixtures) {
  const fx = knockoutFixtures?.[a];
  if (fx && fx.opponent === b && fx.round === round && fx.completed) {
    return fx.won ? a : b;
  }
  return null;
}

// Once FIFA's official Round-of-32 draw is published, a WC slot's opponent
// (the sibling W/RU slot in the same match) already shows that wildcard's
// name in its `knockoutFixtures` entry - this walks BRACKET_HALVES and locks
// every such already-drawn WC slot to its real team, so neither the
// deterministic projected bracket nor the Monte Carlo simulation re-randomizes
// a slot that reality has already fixed.
function knownWildcardAssignment(status, knockoutFixtures) {
  const assignment = {};
  if (!knockoutFixtures) return assignment;
  for (const half of [1, 2]) {
    BRACKET_HALVES[half].forEach((m, idx) => {
      for (const side of ["a", "b"]) {
        const slot = m[side];
        if (slot.t !== "WC") continue;
        const sibling = m[side === "a" ? "b" : "a"];
        const siblingTeam = rankGroup(sibling.g, status)[sibling.t === "W" ? 0 : 1].name;
        const fx = knockoutFixtures[siblingTeam];
        if (fx && fx.round === "R32") {
          assignment[`${half}-${idx}-${side}`] = fx.opponent;
        }
      }
    });
  }
  return assignment;
}

// Randomly assigns the 8 qualifying wildcard (best 3rd-place) teams into
// BRACKET_HALVES' 8 "WC" slots, respecting each slot's eligible group pool
// where possible (falls back to any remaining team if the pool is exhausted -
// a rare edge case given the pools overlap heavily). Slots whose real
// opponent is already known (`knownAssignment`) are locked to that team
// first; only the remaining, still-undrawn slots are randomized.
function assignWildcards(qualifiedThirds, knownAssignment = {}) {
  const slots = [];
  for (const half of [1, 2]) {
    BRACKET_HALVES[half].forEach((m, idx) => {
      if (m.a.t === "WC") slots.push({ half, idx, side: "a", pool: m.a.pool });
      if (m.b.t === "WC") slots.push({ half, idx, side: "b", pool: m.b.pool });
    });
  }
  const assignment = { ...knownAssignment };
  const remaining = qualifiedThirds.filter(t => !Object.values(assignment).includes(t.name));
  const openSlots = slots.filter(slot => !assignment[`${slot.half}-${slot.idx}-${slot.side}`]);
  for (let i = openSlots.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [openSlots[i], openSlots[j]] = [openSlots[j], openSlots[i]];
  }
  for (const slot of openSlots) {
    let candidates = remaining.filter(t => slot.pool.includes(t.group));
    if (candidates.length === 0) candidates = remaining;
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    assignment[`${slot.half}-${slot.idx}-${slot.side}`] = pick.name;
    remaining.splice(remaining.indexOf(pick), 1);
  }
  return assignment;
}

function resolveHalfPairs(half, st, wcAssignment) {
  return BRACKET_HALVES[half].map((m, idx) => {
    const resolve = (slot, side) => {
      if (slot.t === "WC") return wcAssignment[`${half}-${idx}-${side}`];
      return rankGroup(slot.g, st)[slot.t === "W" ? 0 : 1].name;
    };
    return [resolve(m.a, "a"), resolve(m.b, "b")];
  });
}

// Reduces an ordered list of 8 R32 winners down to a single finalist by
// simulating R16→QF→SF (8→4→2→1), since BRACKET_HALVES only encodes the R32
// round - deeper rounds are just generic adjacent-pair reduction within a half.
function advanceHalf(teamNames, st, probWin, knockoutFixtures) {
  const rounds = ["R16", "QF", "SF"];
  let current = teamNames;
  let semifinalLoser = null;
  for (const round of rounds) {
    const next = [];
    for (let i = 0; i < current.length; i += 2) {
      const a = current[i], b = current[i + 1];
      const real = realKnockoutWinner(a, b, round, knockoutFixtures);
      const aWins = real ? real === a : Math.random() < probWin(a, b);
      const winner = aWins ? a : b, loser = aWins ? b : a;
      const outcome = KNOCKOUT_OUTCOME[round];
      st[winner].st = outcome.win;
      st[loser].st = outcome.lose;
      next.push(winner);
      if (round === "SF") semifinalLoser = loser;
    }
    current = next;
  }
  return { finalist: current[0], semifinalLoser };
}

// Runs one full random playout of the remaining group matches + entire
// knockout bracket from the current real `status`, returning every team's
// final stage (so FINAL_PAYOUT can be summed per owner).
function simulateOnce(status, groupSchedule, strengthOf, knockoutFixtures) {
  const st = {};
  for (const [name, s] of Object.entries(status)) st[name] = { ...s };

  for (const fx of groupSchedule) {
    if (fx.completed) continue;
    const a = st[fx.a], b = st[fx.b];
    if (!a || !b) continue;
    const result = simulateGroupMatch(fx.a, fx.b, strengthOf);
    a.p++; b.p++;
    if (result === "draw") {
      a.d++; b.d++; a.pts += 1; b.pts += 1; a.gf += 1; a.ga += 1; b.gf += 1; b.ga += 1;
    } else {
      const winner = result === "a" ? a : b, loser = result === "a" ? b : a;
      winner.w++; winner.pts += 3; winner.gf += 2; winner.ga += 1;
      loser.l++; loser.gf += 1; loser.ga += 2;
    }
  }

  const thirdCandidates = [];
  for (const letter of Object.keys(GROUPS)) {
    const ranked = rankGroup(letter, st);
    st[ranked[0].name].st = "R32";
    st[ranked[1].name].st = "R32";
    st[ranked[3].name].st = "EG";
    const s3 = ranked[2].s;
    thirdCandidates.push({ name: ranked[2].name, group: letter, pts: s3.pts, gd: s3.gf - s3.ga, gf: s3.gf });
  }
  thirdCandidates.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name));
  const qualifiedThirds = thirdCandidates.slice(0, 8);
  for (const t of thirdCandidates.slice(8)) st[t.name].st = "EG";
  for (const t of qualifiedThirds) st[t.name].st = "R32";

  const knownWc = knownWildcardAssignment(st, knockoutFixtures);
  const wcAssignment = assignWildcards(qualifiedThirds, knownWc);
  const probWin = makeProbWin(strengthOf);

  const halfFinalists = {}, semiLosers = {};
  for (const half of [1, 2]) {
    const pairs = resolveHalfPairs(half, st, wcAssignment);
    const r32Winners = pairs.map(([a, b]) => {
      const real = realKnockoutWinner(a, b, "R32", knockoutFixtures);
      const aWins = real ? real === a : Math.random() < probWin(a, b);
      const winner = aWins ? a : b, loser = aWins ? b : a;
      st[winner].st = "R16"; st[loser].st = "E32";
      return winner;
    });
    const { finalist, semifinalLoser } = advanceHalf(r32Winners, st, probWin, knockoutFixtures);
    halfFinalists[half] = finalist;
    semiLosers[half] = semifinalLoser;
  }

  const [f1, f2] = [halfFinalists[1], halfFinalists[2]];
  const realFinal = realKnockoutWinner(f1, f2, "FINAL", knockoutFixtures);
  const f1Wins = realFinal ? realFinal === f1 : Math.random() < probWin(f1, f2);
  st[f1Wins ? f1 : f2].st = "CH";
  st[f1Wins ? f2 : f1].st = "RU";

  const [s1, s2] = [semiLosers[1], semiLosers[2]];
  const realThird = realKnockoutWinner(s1, s2, "3RD_PLACE", knockoutFixtures);
  const s1Wins = realThird ? realThird === s1 : Math.random() < probWin(s1, s2);
  st[s1Wins ? s1 : s2].st = "3RD";
  st[s1Wins ? s2 : s1].st = "4TH";

  return st;
}

function runPayoutSimulations(status, groupSchedule, strengthOf, n, knockoutFixtures) {
  const owners = Object.keys(BIDDERS);
  const ownerPayouts = Object.fromEntries(owners.map(o => [o, []]));
  for (let i = 0; i < n; i++) {
    const st = simulateOnce(status, groupSchedule, strengthOf, knockoutFixtures);
    const totals = Object.fromEntries(owners.map(o => [o, 0]));
    for (const t of TEAMS) totals[t.owner] += FINAL_PAYOUT[st[t.name].st] ?? 0;
    for (const o of owners) ownerPayouts[o].push(totals[o]);
  }
  return ownerPayouts;
}

function percentile(sorted, p) {
  const idx = (sorted.length - 1) * p;
  const lo = Math.floor(idx), hi = Math.ceil(idx);
  if (lo === hi) return sorted[lo];
  return sorted[lo] + (sorted[hi] - sorted[lo]) * (idx - lo);
}

function summarizePayouts(ownerPayouts) {
  return Object.fromEntries(Object.entries(ownerPayouts).map(([o, vals]) => {
    const sorted = [...vals].sort((a, b) => a - b);
    const mean = vals.reduce((s, v) => s + v, 0) / vals.length;
    return [o, {
      mean,
      median: percentile(sorted, 0.5),
      p25: percentile(sorted, 0.25),
      p75: percentile(sorted, 0.75),
    }];
  }));
}

async function fetchGroupSchedule() {
  const dates = [];
  const start = TOURNAMENT_START_DATE;
  const end = new Date("2026-06-28T00:00:00Z");
  for (let d = new Date(start); d <= end; d = new Date(d.getTime() + 864e5)) {
    dates.push(d.toISOString().slice(0, 10).replace(/-/g, ""));
  }
  const dayResults = await Promise.all(dates.map(d =>
    fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${d}&t=${Date.now()}`)
      .then(r => r.json()).then(j => j.events || []).catch(() => [])
  ));
  const byId = new Map();
  for (const events of dayResults) for (const ev of events) byId.set(ev.id, ev);
  const fixtures = [];
  for (const ev of byId.values()) {
    const comp = ev.competitions?.[0]; if (!comp) continue;
    if (!(ev.season?.slug || "").toLowerCase().includes("group")) continue;
    const cs = comp.competitors || []; if (cs.length < 2) continue;
    const home = cs.find(c => c.homeAway === "home") || cs[0];
    const away = cs.find(c => c.homeAway === "away") || cs[1];
    const A = findTeam(home.team?.displayName);
    const B = findTeam(away.team?.displayName);
    if (!A || !B) continue;
    fixtures.push({ a: A.name, b: B.name, completed: !!comp.status?.type?.completed });
  }
  return fixtures;
}

// ─── Deterministic odds-favorite bracket (click-to-override) ─────────────────
// Distinct from the Monte Carlo engine above: instead of randomizing every
// matchup thousands of times, this picks a single bracket - whichever team
// has the better title-odds strength wins each matchup, unless the user has
// clicked a specific override for that exact matchup (identified by a stable
// round/half/index key, independent of which teams actually land there).
function pickWinner(key, a, b, strengthOf, matchupOverrides, round, knockoutFixtures) {
  const real = realKnockoutWinner(a, b, round, knockoutFixtures);
  if (real) return real;
  const forced = matchupOverrides[key];
  if (forced === a || forced === b) return forced;
  return strengthOf(a) >= strengthOf(b) ? a : b;
}

// Resolves every still-unplayed group match by chalk (no draws - whoever has
// the better title-odds strength wins 2-1) so the odds-favorite bracket's
// group-stage qualifiers are decided by the same "favorite always wins" logic
// as the knockout rounds, instead of freezing on a part-played group's
// current, still-changing standings.
function projectGroupStageChalk(status, groupSchedule, strengthOf) {
  const st = {};
  for (const [name, s] of Object.entries(status)) st[name] = { ...s };
  if (!groupSchedule) return st;
  for (const fx of groupSchedule) {
    if (fx.completed) continue;
    const a = st[fx.a], b = st[fx.b];
    if (!a || !b) continue;
    const aWins = strengthOf(fx.a) >= strengthOf(fx.b);
    const winner = aWins ? a : b, loser = aWins ? b : a;
    winner.p++; loser.p++;
    winner.w++; winner.pts += 3; winner.gf += 2; winner.ga += 1;
    loser.l++; loser.gf += 1; loser.ga += 2;
  }
  return st;
}

function buildProjectedBracket(status, groupSchedule, strengthOf, matchupOverrides, knockoutFixtures) {
  status = projectGroupStageChalk(status, groupSchedule, strengthOf);
  // Qualification uses the chalk-projected group standings above, so an
  // unfinished group's qualifiers are decided by the same odds-favorite
  // logic as the knockout rounds rather than freezing mid-group.
  const top8 = getCurrentThirdPlace(status).slice(0, 8);
  const top8Names = new Set(top8.map(r => r.name));

  const wcSlots = [];
  for (const half of [1, 2]) {
    BRACKET_HALVES[half].forEach((m, idx) => {
      if (m.a.t === "WC") wcSlots.push({ half, idx, side: "a", pool: m.a.pool });
      if (m.b.t === "WC") wcSlots.push({ half, idx, side: "b", pool: m.b.pool });
    });
  }
  // Slots whose real opponent is already known from FIFA's published draw
  // are locked to that team first; only the remaining, still-undrawn slots
  // fall back to greedily seating the strongest qualifying thirds.
  const knownWc = knownWildcardAssignment(status, knockoutFixtures);
  const remainingThirds = top8
    .filter(r => !Object.values(knownWc).includes(r.name))
    .sort((x, y) => strengthOf(y.name) - strengthOf(x.name));
  const wcAssignment = { ...knownWc };
  for (const slot of wcSlots) {
    const slotKey = `${slot.half}-${slot.idx}-${slot.side}`;
    if (wcAssignment[slotKey]) continue;
    if (remainingThirds.length === 0) break;
    let i = remainingThirds.findIndex(r => slot.pool.includes(r.group));
    if (i === -1) i = 0;
    wcAssignment[slotKey] = remainingThirds.splice(i, 1)[0].name;
  }
  const resolveTeam = (slot, half, idx, side) =>
    slot.t === "WC" ? wcAssignment[`${half}-${idx}-${side}`] : rankGroup(slot.g, status)[slot.t === "W" ? 0 : 1].name;

  function buildHalf(half) {
    const r32 = BRACKET_HALVES[half].map((m, idx) => {
      const a = resolveTeam(m.a, half, idx, "a");
      const b = resolveTeam(m.b, half, idx, "b");
      const key = `R32-${half}-${idx}`;
      const winner = pickWinner(key, a, b, strengthOf, matchupOverrides, "R32", knockoutFixtures);
      return { key, round: "R32", a, b, winner, final: !!realKnockoutWinner(a, b, "R32", knockoutFixtures) };
    });
    const rounds = [r32];
    let teams = r32.map(m => m.winner);
    for (const roundName of ["R16", "QF", "SF"]) {
      const matches = [];
      for (let i = 0; i < teams.length; i += 2) {
        const key = `${roundName}-${half}-${i / 2}`;
        const a = teams[i], b = teams[i + 1];
        const winner = pickWinner(key, a, b, strengthOf, matchupOverrides, roundName, knockoutFixtures);
        matches.push({ key, round: roundName, a, b, winner, final: !!realKnockoutWinner(a, b, roundName, knockoutFixtures) });
      }
      rounds.push(matches);
      teams = matches.map(m => m.winner);
    }
    return { rounds, finalist: teams[0] };
  }

  const half1 = buildHalf(1), half2 = buildHalf(2);
  const semifinalLoser = (half) => {
    const sf = half.rounds[3][0];
    return sf.winner === sf.a ? sf.b : sf.a;
  };
  const s1 = semifinalLoser(half1), s2 = semifinalLoser(half2);

  const finalMatch = { key: "FINAL", round: "FINAL", a: half1.finalist, b: half2.finalist,
    winner: pickWinner("FINAL", half1.finalist, half2.finalist, strengthOf, matchupOverrides, "FINAL", knockoutFixtures),
    final: !!realKnockoutWinner(half1.finalist, half2.finalist, "FINAL", knockoutFixtures) };
  const thirdMatch = { key: "THIRD", round: "3RD_PLACE", a: s1, b: s2,
    winner: pickWinner("THIRD", s1, s2, strengthOf, matchupOverrides, "3RD_PLACE", knockoutFixtures),
    final: !!realKnockoutWinner(s1, s2, "3RD_PLACE", knockoutFixtures) };

  const stage = {};
  for (const letter of Object.keys(GROUPS)) {
    const ranked = rankGroup(letter, status);
    stage[ranked[3].name] = "EG";
    if (!top8Names.has(ranked[2].name)) stage[ranked[2].name] = "EG";
  }
  for (const round of [...half1.rounds, ...half2.rounds, [finalMatch], [thirdMatch]]) {
    for (const m of round) {
      const outcome = KNOCKOUT_OUTCOME[m.round];
      const loser = m.winner === m.a ? m.b : m.a;
      stage[m.winner] = outcome.win;
      stage[loser] = outcome.lose;
    }
  }

  return { half1, half2, finalMatch, thirdMatch, champion: finalMatch.winner, stage, wcAssignment };
}

const MATCHUP_OVERRIDES_KEY = "wc26_bracket_matchup_overrides_v1";
function loadMatchupOverrides() {
  try { return JSON.parse(localStorage.getItem(MATCHUP_OVERRIDES_KEY)) || {}; } catch { return {}; }
}
function saveMatchupOverrides(overrides) {
  try { localStorage.setItem(MATCHUP_OVERRIDES_KEY, JSON.stringify(overrides)); } catch {}
}

// ─── Main component ───────────────────────────────────────────────────────────
function PoolDashboard() {
  const [tab, setTab]               = useState("fixtures");
  const [status, setStatus]         = useState(seedStatus);
  const [fixtures, setFixtures]     = useState(SEED_FIXTURES);
  const [h2h, setH2h]               = useState({});
  const [oddsHistory, setOddsHistory] = useState({});
  const [qualHistory, setQualHistory] = useState([]);
  const [titleOddsHistory, setTitleOddsHistory] = useState([]);
  const [payoutProjection, setPayoutProjection] = useState(null);
  const [knockoutFixtures, setKnockoutFixtures] = useState({});
  const [groupSchedule, setGroupSchedule]       = useState([]);
  const [bracketView, setBracketView] = useState("live");
  const [updated, setUpdated]       = useState(new Date(SEED_DATE));
  const [fixturesLive, setFixturesLive] = useState(false);
  const [ownerFilter, setOwnerFilter] = useState("All");
  const [aliveOnly, setAliveOnly]   = useState(false);
  const [sortCol, setSortCol]       = useState("payout");   // bid|payout|roi|wdl|name
  const [sortDir, setSortDir]       = useState(-1);          // 1 asc, -1 desc

  const toggleSort = (col) => {
    if (sortCol === col) setSortDir(d => -d);
    else { setSortCol(col); setSortDir(-1); }
  };
  const SortHdr = ({col, children, align}) => {
    const active = sortCol === col;
    return (
      <span onClick={() => toggleSort(col)}
        style={{cursor:"pointer", color: active ? C.gold : C.mute,
          textAlign: align||"left", userSelect:"none",
          display:"flex", alignItems:"center", gap:3,
          justifyContent: align==="right" ? "flex-end" : "flex-start"}}>
        {children}
        <span style={{fontSize:8, opacity: active ? 1 : 0.3}}>
          {active ? (sortDir === -1 ? "▼" : "▲") : "⬍"}
        </span>
      </span>
    );
  };

  // Fetch standings + H2H live from ESPN every 60s (same source as fixtures —
  // no longer dependent on the GitHub Actions cron job, which can lag for hours)
  useEffect(() => {
    const run = () => fetchAllEspnEvents()
      .then(events => {
        if (events.length) {
          const { status: s, h2h: h } = computeStandingsAndH2H(events);
          setStatus(s);
          setH2h(h);
        }
      })
      .catch(() => {});
    run();
    const id = setInterval(run, 60000);
    return () => clearInterval(id);
  }, []);

  // Fetch fixtures live from ESPN every 60s
  useEffect(() => {
    const run = () => fetchESPN()
      .then(fx => { if (fx.length) { setFixtures(fx); setFixturesLive(true); setUpdated(new Date()); } })
      .catch(() => {});
    run();
    const id = setInterval(run, 60000);
    return () => clearInterval(id);
  }, []);

  // Odds-trend history is snapshotted hourly by a GitHub Action (lightweight,
  // separate from live scoring) — just re-fetch the static file every 5 min.
  useEffect(() => {
    const run = () => fetch(`data/odds_history.json?t=${Date.now()}`)
      .then(r => r.json()).then(setOddsHistory).catch(() => {});
    run();
    const id = setInterval(run, 300000);
    return () => clearInterval(id);
  }, []);

  // Qualification-count history is snapshotted alongside live scores by the
  // same GitHub Action (every 15 min, only written when a count changes) —
  // just re-fetch the static file every 5 min.
  useEffect(() => {
    const run = () => fetch(`data/qualification_history.json?t=${Date.now()}`)
      .then(r => r.json()).then(setQualHistory).catch(() => {});
    run();
    const id = setInterval(run, 300000);
    return () => clearInterval(id);
  }, []);

  // Tournament title-odds history is snapshotted once a day (~11am ET) by a
  // separate GitHub Action - re-fetching every 5 min is harmless overkill,
  // just kept consistent with the other history fetchers.
  useEffect(() => {
    const run = () => fetch(`data/title_odds_history.json?t=${Date.now()}`)
      .then(r => r.json()).then(setTitleOddsHistory).catch(() => {});
    run();
    const id = setInterval(run, 300000);
    return () => clearInterval(id);
  }, []);

  // Payout-projection Monte Carlo is run server-side once a night (after that
  // day's matches finish) rather than re-simulated client-side on every page
  // load - re-fetching every 5 min just picks up the latest nightly run.
  useEffect(() => {
    const run = () => fetch(`data/payout_projection.json?t=${Date.now()}`)
      .then(r => r.json()).then(setPayoutProjection).catch(() => {});
    run();
    const id = setInterval(run, 300000);
    return () => clearInterval(id);
  }, []);

  // Once FIFA's Round-of-32 draw is published, it shows up in ESPN's schedule
  // as concrete (still-to-play) fixtures - poll for it so wildcard bracket
  // slots can show the real opponent instead of just the eligible pool.
  useEffect(() => {
    const run = () => fetchKnockoutFixtures().then(setKnockoutFixtures).catch(() => {});
    run();
    const id = setInterval(run, 300000);
    return () => clearInterval(id);

  // Full group-stage fixture list (played + still-to-play), needed by the

  useEffect(() => {

  useEffect(() => {

  // Title-odds tab unlocks once every team has played its 2nd group match -

  const allMatchday2Done = useMemo(

  const latestTeamPrices = useMemo(

  const board = useMemo(() => {

      const aliveTeams = mine.filter(t => isAlive(status[t.name].st));
      const ceiling    = deadPay + aliveTeams.reduce((s,t,i) => s + Math.max(BEST_SLOTS[i]??0, payoutLocked(status[t.name].st)), 0);
      return {name, spent, locked, ceiling, alive, net: locked - spent, teams: mine};

  }, [status]);

  const superlatives = useMemo(() => {
    let bestValue=null, bust=null, hotStreak=null;

    });
    for (const t of teamRecords) {
      if (t.roi !== null && t.pay > 0 && (!bestValue || t.roi > bestValue.roi)) bestValue = t;
      if (!isAlive(t.s.st) && t.pay===0 && (!bust || t.bid > bust.bid)) bust = t;
      if (t.s.w >= 2 && (!hotStreak || t.s.w > hotStreak.s.w)) hotStreak = t;

  const filteredTeams = useMemo(() => {
    const list = TEAMS.filter(t =>
      (ownerFilter==="All" || t.owner===ownerFilter) &&

      let cmp = 0;
      if      (sortCol==="name")   cmp = a.name.localeCompare(b.name);
      else if (sortCol==="bid")    cmp = a.bid - b.bid;
      else if (sortCol==="payout") cmp = pa - pb;
      else if (sortCol==="roi")    cmp = roiA - roiB;
      else if (sortCol==="wdl")    cmp = sa.pts - sb.pts || sa.w - sb.w;
      return cmp * sortDir || b.bid - a.bid;
    });
    return list;
  }, [ownerFilter, aliveOnly, status, sortCol, sortDir]);

  return (
    <div style={{...body,background:C.bg,minHeight:"100vh",color:C.text}}>
