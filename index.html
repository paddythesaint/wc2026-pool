                        </span>
                        <span style={{...disp,fontSize:15,fontWeight:700,color:anyPlayed?C.text:C.mute,textAlign:"right"}}>
                          {s.pts}
                        </span>
                        <RoiBadge team={t} st={s.st} />
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
          <div className="flex flex-wrap items-center gap-4 mt-3" style={{fontSize:11,color:C.mute}}>
            <span><span style={{color:C.green,fontWeight:700}}>1–2</span> auto-qualify · <span style={{color:C.gold,fontWeight:700}}>3rd</span> in best-thirds race</span>
            <span>ROI = locked payout ÷ bid (excludes random $1 draws)</span>
          </div>
        </div>
      )}

      {/* ══ BRACKET ══ */}
      {tab==="bracket" && (
        <div className="max-w-5xl mx-auto px-4 py-4 space-y-4">
          <div className="flex gap-2">
            {[["live","LIVE RESULTS"],["projected","PROJECTED"]].map(([id,label]) => (
              <button key={id} onClick={()=>setBracketView(id)}
                style={{fontSize:11,fontWeight:600,letterSpacing:"0.08em",padding:"5px 12px",
                  borderRadius:5,cursor:"pointer",border:`1px solid ${bracketView===id?C.gold:C.line}`,
                  background:bracketView===id?"#1A2438":"transparent",color:bracketView===id?C.gold:C.mute}}>
                {label}
                {id==="projected" && (
                  <span style={{marginLeft:6,fontSize:9,fontWeight:700,letterSpacing:"0.05em",
                    color:C.mute,border:`1px solid ${C.line}`,borderRadius:4,padding:"1px 4px",verticalAlign:"middle"}}>
                    BETA
                  </span>
                )}
              </button>
            ))}
          </div>
          {bracketView==="live" ? (
            <React.Fragment>
              <BracketPanel status={status} knockoutFixtures={knockoutFixtures} />
              <QualificationHistoryPanel qualHistory={qualHistory} />
            </React.Fragment>
          ) : (
            <ProjectedTournamentPanel status={status} groupSchedule={groupSchedule} latestTeamPrices={latestTeamPrices} payoutProjection={payoutProjection} knockoutFixtures={knockoutFixtures} />
          )}
        </div>
      )}

      {/* ══ FIXTURES ══ */}
      {tab==="fixtures" && (
        <div className="max-w-5xl mx-auto px-4 py-4 space-y-4">
          <H2HLeaderboard status={status} />
          <H2HSection h2h={h2h} />
          {fixtures.length===0 && (
            <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,
              padding:20,textAlign:"center",color:C.mute,fontSize:14}}>
              No fixtures loaded — data auto-updates every 5 minutes during match hours.
            </div>
          )}
          {Object.entries(
            fixtures.reduce((acc,m) => { (acc[m.d||"Schedule"]||=[]).push(m); return acc; }, {})
          ).map(([day,matches]) => {
            const today   = new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});
            const isToday = day===today;
            return (
              <div key={day}>
                <div className="flex items-center gap-2 mb-2">
                  <span style={{...disp,fontSize:13,fontWeight:700,letterSpacing:"0.14em",
                    color:isToday?C.gold:C.mute}}>{day.toUpperCase()}</span>
                  {isToday && (
                    <span style={{...disp,fontSize:10,fontWeight:600,letterSpacing:"0.1em",
                      color:"#06120B",background:C.gold,borderRadius:999,padding:"2px 8px"}}>TODAY</span>
                  )}
                </div>
                <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
                  {matches.map((m,i) => {
                    const A=findTeam(m.a), B=findTeam(m.b);
                    const duel    = A&&B&&A.owner!==B.owner;
                    const live    = /live|^ht$|half/i.test(m.k||"");
                    const played  = m.s&&m.s.trim()!=="";
                    const upcoming = !live && !played;
                    const Side = ({T,raw,align}) => (
                      <div className={align==="r"?"text-right":""} style={{minWidth:0}}>
                        <div className="truncate" style={{fontSize:14,fontWeight:600}}>
                          {align==="r"
                            ? <>{T?T.name:raw} <Flag f={T?.flag} /></>
                            : <><Flag f={T?.flag} /> {T?T.name:raw}</>}
                        </div>
                        {T && (
                          <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.08em",
                            color:BIDDERS[T.owner].color}}>
                            {BIDDERS[T.owner].short} · ${T.bid}
                          </div>
                        )}
                      </div>
                    );
                    return (
                      <div key={i} className="px-3 py-3"
                        style={{borderBottom:i<matches.length-1?`1px solid ${C.line}`:"none"}}>
                        <div className="grid items-center" style={{gridTemplateColumns:"1fr auto 1fr",gap:10}}>
                          <Side T={A} raw={m.a} align="r"/>
                          <div className="text-center" style={{minWidth:64}}>
                            {live ? (
                              <div>
                                <span style={{...disp,fontSize:20,fontWeight:700}}>{m.s||"0-0"}</span>
                                <div className="livepulse" style={{...disp,fontSize:9,fontWeight:700,
                                  letterSpacing:"0.2em",color:C.red}}>● LIVE</div>
                              </div>
                            ) : played ? (
                              <span style={{...disp,fontSize:20,fontWeight:700}}>{m.s}</span>
                            ) : (
                              <span style={{fontSize:11,color:C.mute}}>{m.k||"vs"}</span>
                            )}
                          </div>
                          <Side T={B} raw={m.b}/>
                        </div>
                        {/* Odds bar for upcoming matches */}
                        {upcoming && m.odds && (
                          <OddsBar odds={m.odds} nameA={A?A.name:m.a} nameB={B?B.name:m.b} />
                        )}
                        {upcoming && m.id && oddsHistory[m.id] && (
                          <OddsTrend snaps={oddsHistory[m.id].snaps} nameA={A?A.name:m.a} nameB={B?B.name:m.b} />
                        )}
                        <div className="flex items-center justify-center gap-2 mt-1"
                          style={{fontSize:10,color:C.mute}}>
                          {m.g && <span>{m.g}</span>}
                          {duel && (
                            <span style={{...disp,fontWeight:700,letterSpacing:"0.08em",color:C.gold,
                              border:`1px solid ${C.line}`,borderRadius:999,padding:"1px 8px"}}>
                              ⚔ {BIDDERS[A.owner].short} v {BIDDERS[B.owner].short}
                            </span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
          {fixtures.length>0 && (
            <div style={{fontSize:11,color:C.mute}}>
              ⚔ head-to-head between pool members · Odds shown for upcoming matches (implied win probability)
            </div>
          )}
        </div>
      )}

      {/* ══ TEAMS ══ */}
      {tab==="teams" && (
        <div className="max-w-5xl mx-auto px-4 py-4">
          <div className="flex flex-wrap items-center gap-2 mb-3">
            {["All",...Object.keys(BIDDERS)].map(o => (
              <button key={o} onClick={()=>setOwnerFilter(o)}
                style={{fontSize:12,fontWeight:600,padding:"5px 12px",borderRadius:999,cursor:"pointer",
                  border:`1px solid ${ownerFilter===o?(BIDDERS[o]?.color||C.gold):C.line}`,
                  background:ownerFilter===o?"#1A2438":"transparent",
                  color:ownerFilter===o?(BIDDERS[o]?.color||C.gold):C.mute}}>
                {o}
              </button>
            ))}
            <button onClick={()=>setAliveOnly(!aliveOnly)}
              style={{fontSize:12,fontWeight:600,padding:"5px 12px",borderRadius:999,cursor:"pointer",
                marginLeft:"auto",border:`1px solid ${aliveOnly?C.green:C.line}`,
                background:aliveOnly?"#13261C":"transparent",color:aliveOnly?C.green:C.mute}}>
              Alive only
            </button>
          </div>
          <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:8,overflow:"hidden"}}>
            <div className="grid px-3 py-2"
              style={{gridTemplateColumns:"minmax(0,2fr) 0.8fr 0.5fr 0.9fr 1.2fr 0.6fr 0.7fr",gap:6,
                fontSize:10,letterSpacing:"0.12em",...disp,fontWeight:600,
                borderBottom:`1px solid ${C.line}`}}>
              <SortHdr col="name">TEAM</SortHdr>
              <span style={{color:C.mute}}>OWNER</span>
              <SortHdr col="bid">BID</SortHdr>
              <SortHdr col="wdl">W-D-L (PTS)</SortHdr>
              <span style={{color:C.mute}}>STATUS</span>
              <SortHdr col="payout" align="right">PAYOUT</SortHdr>
              <SortHdr col="roi" align="right">ROI</SortHdr>
            </div>
            {filteredTeams.map(t => {
              const s   = status[t.name];
              const out = !isAlive(s.st);
              const pay = payoutLocked(s.st);
              return (
                <div key={t.name} className="grid px-3 py-2 items-center"
                  style={{gridTemplateColumns:"minmax(0,2fr) 0.8fr 0.5fr 0.9fr 1.2fr 0.6fr 0.7fr",gap:6,
                    fontSize:13,borderBottom:`1px solid ${C.line}`,opacity:out&&pay===0?0.55:1}}>
                  <span className="truncate">
                    <span style={{marginRight:6}}><Flag f={t.flag} /></span>
                    <b>{t.name}</b>
                    {s.w>=2 && isAlive(s.st) && <span style={{marginLeft:4,fontSize:12}}>🔥</span>}
                  </span>
                  <span style={{color:BIDDERS[t.owner].color,fontWeight:600,fontSize:12}}>{t.owner}</span>
                  <span style={{color:C.mute}}>${t.bid}</span>
                  <span style={{color:C.mute,fontSize:12}}>{s.p>0?`${s.w}-${s.d}-${s.l} (${s.pts})`:"—"}</span>
                  <span style={{fontSize:11,fontWeight:600,
                    color:s.st==="CH"?C.gold:out?C.red:C.green}}>
                    {STAGE_LABEL[s.st]}
                  </span>
                  <span className="text-right" style={{color:pay>0?C.gold:C.mute,fontWeight:pay>0?700:400}}>
                    {pay>0?`$${pay}`:"—"}
                  </span>
                  <span className="text-right">
                    <RoiBadge team={t} st={s.st} />
                  </span>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:11,color:C.mute,marginTop:8}}>
            ROI = locked payout ÷ bid price · 🎲 RANDOM = randomly allocated team · 🔥 = won 2+ group games · Click column headers to sort
          </div>
        </div>
      )}

      {/* ══ UPSETS ══ */}
      {tab==="upsets" && (
        <div className="max-w-5xl mx-auto px-4 py-4">
          <UpsetsPanel oddsHistory={oddsHistory} />
          <div style={{fontSize:11,color:C.mute,marginTop:8}}>
            Upset = the actual result was less likely than not per the closing betting line · based on tracked odds, may not cover every match
          </div>
        </div>
      )}

      {/* ══ TITLE ODDS ══ */}
      {tab==="odds" && allMatchday2Done && (
        <div className="max-w-5xl mx-auto px-4 py-4">
          <TitleOddsHistoryPanel titleOddsHistory={titleOddsHistory} />
        </div>
      )}

      <div className="max-w-5xl mx-auto px-4 pb-8 pt-2" style={{fontSize:11,color:C.mute}}>
        WC26 Auction Pool · Patrick, Sunny, Sandeep & Ben · Live scores via ESPN · Refreshes every 60s
        <br/>* Max upside = best realistic scenario: alive teams assigned the top available prize slots (1 champion, 1 runner-up, 1 3rd, etc.)
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PoolDashboard />);
</script>
</body>
</html>
