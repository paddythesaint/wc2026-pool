name: Update Scores

on:
  # Tournament complete (Jul 19 2026) - cron disabled, kept for reference.
  # schedule:
  # # Every 15 minutes during WC2026 match windows (covers noon–2 AM ET all days)
  # # 16:00–23:59 UTC = noon–8 PM ET
  # - cron: "*/15 16-23 * * *"
  # # 00:00–06:00 UTC = 8 PM–2 AM ET
  # - cron: "*/15 0-6 * * *"
  workflow_dispatch:   # manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live scores
        run: python scripts/update_scores.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          if git diff --staged --quiet; then
            echo "Scores unchanged — no commit needed"
          else
            git commit -m "chore: update scores $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi
