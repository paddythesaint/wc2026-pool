name: Update Scores

on:
  schedule:
    # Every 15 minutes, all day — widened from the noon-2AM ET match window
    # to also catch late-finishing group games during the 2AM-noon ET gap.
    # TODO: narrow this back to match windows once the group stage wraps up.
    - cron: "*/15 * * * *"
  workflow_dispatch:   # manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live scores
        run: python scripts/update_scores.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          if git diff --staged --quiet; then
            echo "Scores unchanged — no commit needed"
          else
            git commit -m "chore: update scores $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push
          fi
