name: Update Scores

on:
  schedule:
    # Runs at 03:00, 09:00, 15:00, 21:00 UTC
    # = 11 PM, 5 AM, 11 AM, 5 PM ET (summer)  — good spread across match windows
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch:   # lets you trigger it manually from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated scores.json

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live scores
        run: python scripts/update_scores.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json
          # Only commit when the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to scores.json — skipping commit"
          else
            git commit -m "chore: update scores $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
